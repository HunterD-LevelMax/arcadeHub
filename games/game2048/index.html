<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>NEON 2048 — ARCADE HUB</title>
  <link rel="preload" href="../../fonts/orbitron-latin-900-normal.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="../../fonts/share-tech-mono-latin-400-normal.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="../../style/fonts.css">
  <link rel="stylesheet" href="../../style/game.css">
  <link rel="stylesheet" href="../../style/game2048.css">
</head>
<body>

  <div class="page">
    <div class="header">
      <a href="../../index.html" class="back-btn md-btn md-btn-outlined md-ripple"><span class="material-symbols-outlined" aria-hidden="true">arrow_back</span>BACK</a>
      <div class="game-title">NEON 2048</div>
      <div class="header-stats">
        <div class="stat-box" id="scoreBox">
          <div class="stat-label">SCORE</div>
          <div class="stat-value" id="scoreVal">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">BEST</div>
          <div class="stat-value" id="bestVal">0</div>
        </div>
      </div>
    </div>

    <div class="game-container">
      <canvas id="c"></canvas>

      <div class="overlay" id="startOverlay">
        <div class="overlay-title" style="color: var(--game-accent); text-shadow: 0 0 30px var(--game-accent);">NEON 2048</div>
        <div class="overlay-sub">MERGE TILES · REACH 2048</div>
        <button type="button" class="start-btn md-btn md-btn-filled md-ripple" id="startBtn"><span class="material-symbols-outlined" aria-hidden="true">play_arrow</span>PLAY</button>
      </div>

      <div class="overlay hidden" id="winOverlay">
        <div class="overlay-title" style="color: var(--neon-yellow); text-shadow: 0 0 30px var(--neon-yellow);">YOU WIN</div>
        <div class="overlay-sub">2048 TILE REACHED</div>
        <div class="overlay-score" id="winScore">0</div>
        <button type="button" class="start-btn md-btn md-btn-filled md-ripple" id="continueBtn"><span class="material-symbols-outlined" aria-hidden="true">skip_next</span>KEEP PLAYING</button>
      </div>

      <div class="overlay hidden" id="gameoverOverlay">
        <div class="overlay-title" style="color: #ff3344;">GAME OVER</div>
        <div class="overlay-sub">NO MOVES LEFT</div>
        <div class="overlay-score" id="finalScore">0</div>
        <div class="overlay-best" id="bestScore">BEST: 0</div>
        <div class="overlay-coins hidden" id="coinRewardBlock">
          <div class="overlay-coins-earned" id="coinRewardEarned">+0 COINS</div>
          <div class="overlay-coins-total" id="coinRewardTotal">TOTAL: 0</div>
        </div>
        <div class="overlay-coins-hint hidden" id="coinRewardHint"></div>
        <button type="button" class="start-btn md-btn md-btn-filled md-ripple" id="restartBtn"><span class="material-symbols-outlined" aria-hidden="true">refresh</span>RETRY</button>
      </div>
    </div>

    <div class="footer" id="controlsHint">ARROWS / WASD · DRAG OR SWIPE TO SLIDE</div>
  </div>

<script src="../../js/arcade-icons.js"></script>
<script src="../../js/audio.js"></script>
<script src="../../js/perf.js"></script>
<script src="../../js/game.js"></script>
<script src="../../js/economy-api.js"></script>
<script>
const BASE_W = 400, BASE_H = 520;
const SIZE = 4;
const SWIPE_MIN = 18;
const SLIDE_MS = 32;
const MERGE_MS = 38;
const SPAWN_MS = 42;

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const USE_SHADOWS = !window.ArcadePerf || window.ArcadePerf.shadows !== false;
const REDUCED_FX = !!(window.ArcadePerf && window.ArcadePerf.reducedEffects);
const MAX_PARTICLES = REDUCED_FX ? 24 : 48;

function W() { return canvas.width; }
function H() { return canvas.height; }

const ui = {
  score: document.getElementById('scoreVal'),
  scoreBox: document.getElementById('scoreBox'),
  best: document.getElementById('bestVal'),
  finalScore: document.getElementById('finalScore'),
  bestScore: document.getElementById('bestScore'),
  winScore: document.getElementById('winScore'),
  startOverlay: document.getElementById('startOverlay'),
  winOverlay: document.getElementById('winOverlay'),
  gameoverOverlay: document.getElementById('gameoverOverlay'),
};

const TILE_STYLE = {
  2: { bg: ['#061828', '#0d2848'], fg: '#00f5ff', glow: '#00f5ff', rim: '#66fbff' },
  4: { bg: ['#140820', '#2a1040'], fg: '#ff99ff', glow: '#ff00ff', rim: '#ff88ff' },
  8: { bg: ['#281004', '#4a2208'], fg: '#ffcc66', glow: '#ff8800', rim: '#ffaa44' },
  16: { bg: ['#0a2010', '#143820'], fg: '#9dff96', glow: '#39ff14', rim: '#7dff72' },
  32: { bg: ['#061828', '#0c2840'], fg: '#88eeff', glow: '#00f5ff', rim: '#aafcff' },
  64: { bg: ['#280810', '#401018'], fg: '#ff99aa', glow: '#ff3344', rim: '#ff6677' },
  128: { bg: ['#140820', '#281040'], fg: '#dd99ff', glow: '#8800ff', rim: '#cc88ff' },
  256: { bg: ['#0a2010', '#183820'], fg: '#c8ffbf', glow: '#39ff14', rim: '#9dff96' },
  512: { bg: ['#081828', '#103040'], fg: '#99f0ff', glow: '#00f5ff', rim: '#ccfaff' },
  1024: { bg: ['#282010', '#403018'], fg: '#ffe066', glow: '#ffff00', rim: '#fff099' },
  2048: { bg: ['#302008', '#604010'], fg: '#fff8cc', glow: '#ff8800', rim: '#ffe066' },
};

const KEYS = {
  UP: ['ArrowUp', 'KeyW'],
  DOWN: ['ArrowDown', 'KeyS'],
  LEFT: ['ArrowLeft', 'KeyA'],
  RIGHT: ['ArrowRight', 'KeyD'],
};

let tileIdCounter = 0;
let grid = emptyGrid();
let particles = [];
let floatTexts = [];
let boardPulse = 0;
let shake = 0;
let anim = null;
let bgPhase = 0;
let needsRedraw = true;
let tilesList = [];
let cellPosCache = [];
let boardLayerCanvas = null;
let boardLayerKey = '';
let cachedBoardMetrics = null;
let cachedBgGradient = null;
const tileGradCache = new Map();
const tileFontCache = new Map();

let renderLoop = null;

initGameCommon(canvas, BASE_W, BASE_H, refreshBoardMetrics);
refreshBoardMetrics();
preloadSfx(['game2048.merge', 'game2048.spawn', 'game2048.win', 'game2048.gameover', 'game2048.slide']);

function markDirty() {
  needsRedraw = true;
  renderLoop?.resume();
}

function syncRenderLoop() {
  if (!renderLoop) return;
  const active =
    anim !== null ||
    particles.length > 0 ||
    floatTexts.length > 0 ||
    shake > 0.4 ||
    boardPulse > 0.02 ||
    needsRedraw;
  if (active) renderLoop.resume();
  else renderLoop.pause();
}

function rebuildTilesList() {
  tilesList = [];
  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      if (grid[y][x]) tilesList.push(grid[y][x]);
    }
  }
  tilesList.sort((a, b) => a.value - b.value);
}

function g2048Shadow(color, blur) {
  if (!USE_SHADOWS) return;
  if (window.ArcadePerf && typeof ArcadePerf.applyShadow === 'function') {
    ArcadePerf.applyShadow(ctx, color, blur);
  } else {
    ctx.shadowColor = color;
    ctx.shadowBlur = blur;
  }
}

function g2048ClearShadow() {
  if (window.ArcadePerf && typeof ArcadePerf.clearShadow === 'function') {
    ArcadePerf.clearShadow(ctx);
  } else {
    ctx.shadowBlur = 0;
  }
}

function getTileGradient(value, size) {
  const style = tileStyle(value);
  const key = value + ':' + Math.round(size);
  let grad = tileGradCache.get(key);
  if (!grad) {
    grad = ctx.createLinearGradient(0, 0, size, size);
    grad.addColorStop(0, style.bg[0]);
    grad.addColorStop(1, style.bg[1]);
    tileGradCache.set(key, grad);
  }
  return grad;
}

function getTileFont(value) {
  if (!tileFontCache.has(value)) {
    const fontSize = value >= 1024 ? 17 : value >= 128 ? 21 : 25;
    tileFontCache.set(value, `700 ${fontSize}px Orbitron`);
  }
  return tileFontCache.get(value);
}

let gameState = {
  score: 0,
  best: getHighScore('game2048'),
  state: 'title',
  won: false,
  keepPlaying: false,
};

ui.best.textContent = String(gameState.best);
ui.bestScore.textContent = `BEST: ${gameState.best}`;

function emptyGrid() {
  return Array.from({ length: SIZE }, () => Array(SIZE).fill(null));
}

function tileStyle(value) {
  if (TILE_STYLE[value]) return TILE_STYLE[value];
  return { bg: ['#1a1030', '#302050'], fg: '#ffffff', glow: '#ff8800', rim: '#ffcc88' };
}

function createTile(value, row, col) {
  return {
    id: ++tileIdCounter,
    value,
    row,
    col,
    prevRow: row,
    prevCol: col,
    spawnT: 0,
    mergeT: 0,
    pulse: Math.random() * Math.PI * 2,
  };
}

function setGridCell(row, col, tile) {
  grid[row][col] = tile;
  if (tile) {
    tile.row = row;
    tile.col = col;
  }
}

function syncTilePositions() {
  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      const tile = grid[y][x];
      if (tile) {
        tile.row = y;
        tile.col = x;
      }
    }
  }
}

function snapshotPrevPositions() {
  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      const tile = grid[y][x];
      if (tile) {
        tile.prevRow = tile.row;
        tile.prevCol = tile.col;
        tile.mergeT = 0;
      }
    }
  }
}

function easeOutCubic(t) {
  return 1 - Math.pow(1 - t, 3);
}

function easeOutBack(t) {
  const c = 1.70158;
  return 1 + (c + 1) * Math.pow(t - 1, 3) + c * Math.pow(t - 1, 2);
}

function easeOutElastic(t) {
  if (t === 0 || t === 1) return t;
  return Math.pow(2, -10 * t) * Math.sin((t - 0.075) * (2 * Math.PI) / 0.3) + 1;
}

function initBoard() {
  grid = emptyGrid();
  particles = [];
  floatTexts = [];
  anim = null;
  gameState.score = 0;
  gameState.won = false;
  gameState.keepPlaying = false;
  ui.score.textContent = '0';
  addRandomTile(true);
  addRandomTile(true);
  rebuildTilesList();
  markDirty();
}

function init() {
  gameState.state = 'title';
  initBoard();
  ui.bestScore.textContent = `BEST: ${gameState.best}`;
}

function listEmptyCells() {
  const cells = [];
  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      if (!grid[y][x]) cells.push({ x, y });
    }
  }
  return cells;
}

function addRandomTile(isInitial) {
  const empty = listEmptyCells();
  if (empty.length === 0) return null;
  const spot = empty[Math.floor(Math.random() * empty.length)];
  const value = Math.random() < 0.9 ? 2 : 4;
  const tile = createTile(value, spot.y, spot.x);
  tile.spawnT = isInitial ? 1 : 0;
  setGridCell(spot.y, spot.x, tile);
  return tile;
}

function slideLineEntries(entries) {
  const tiles = entries.filter(Boolean);
  const result = Array(SIZE).fill(null);
  const merges = [];
  let points = 0;
  let out = 0;
  let i = 0;

  while (i < tiles.length) {
    if (i + 1 < tiles.length && tiles[i].value === tiles[i + 1].value) {
      const merged = tiles[i];
      merged.value *= 2;
      merged.mergeT = 0.001;
      merges.push(merged);
      points += merged.value;
      result[out++] = merged;
      i += 2;
    } else {
      result[out++] = tiles[i];
      i += 1;
    }
  }

  const beforeIds = entries.filter(Boolean).map((t) => t.id).sort().join(',');
  const afterIds = result.filter(Boolean).map((t) => t.id).sort().join(',');
  const changed = beforeIds !== afterIds ||
    entries.some((tile, index) => (tile && result[index] !== tile) || (!tile && result[index]));

  return { result, points, changed, merges };
}

function moveRow(y, toLeft) {
  const entries = toLeft
    ? grid[y].slice()
    : grid[y].slice().reverse();
  const { result, points, changed, merges } = slideLineEntries(entries);
  const finalRow = toLeft ? result : result.reverse();
  for (let x = 0; x < SIZE; x++) setGridCell(y, x, finalRow[x]);
  return { points, changed, merges };
}

function moveCol(x, toUp) {
  const entries = toUp
    ? grid.map((row) => row[x])
    : grid.map((row) => row[x]).reverse();
  const { result, points, changed, merges } = slideLineEntries(entries);
  const finalCol = toUp ? result : result.reverse();
  for (let y = 0; y < SIZE; y++) setGridCell(y, x, finalCol[y]);
  return { points, changed, merges };
}

function applyMove(direction) {
  snapshotPrevPositions();
  let moved = false;
  let gained = 0;
  const merges = [];

  if (direction === 'left') {
    for (let y = 0; y < SIZE; y++) {
      const res = moveRow(y, true);
      if (res.changed) moved = true;
      gained += res.points;
      merges.push(...res.merges);
    }
  } else if (direction === 'right') {
    for (let y = 0; y < SIZE; y++) {
      const res = moveRow(y, false);
      if (res.changed) moved = true;
      gained += res.points;
      merges.push(...res.merges);
    }
  } else if (direction === 'up') {
    for (let x = 0; x < SIZE; x++) {
      const res = moveCol(x, true);
      if (res.changed) moved = true;
      gained += res.points;
      merges.push(...res.merges);
    }
  } else if (direction === 'down') {
    for (let x = 0; x < SIZE; x++) {
      const res = moveCol(x, false);
      if (res.changed) moved = true;
      gained += res.points;
      merges.push(...res.merges);
    }
  }

  syncTilePositions();
  return { moved, gained, merges };
}

function canMove() {
  if (listEmptyCells().length > 0) return true;
  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      const tile = grid[y][x];
      if (!tile) continue;
      if (x + 1 < SIZE && grid[y][x + 1] && tile.value === grid[y][x + 1].value) return true;
      if (y + 1 < SIZE && grid[y + 1][x] && tile.value === grid[y + 1][x].value) return true;
    }
  }
  return false;
}

function hasTile(value) {
  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      if (grid[y][x] && grid[y][x].value === value) return true;
    }
  }
  return false;
}

function burstParticles(cx, cy, color, intensity) {
  const count = Math.min(MAX_PARTICLES - particles.length, REDUCED_FX ? 4 + intensity * 2 : 6 + intensity * 3);
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * (2 + intensity);
    particles.push({
      x: cx,
      y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.025 + Math.random() * 0.03,
      color,
      size: 1.5 + Math.random() * (2 + intensity * 0.5),
    });
  }
}

function addFloatText(cx, cy, text, color) {
  floatTexts.push({ x: cx, y: cy, text, color, life: 1, vy: -0.8 });
}

function flashScoreBox() {
  ui.scoreBox.classList.remove('score-pop');
  void ui.scoreBox.offsetWidth;
  ui.scoreBox.classList.add('score-pop');
}

function finishMove(gained, merges) {
  gameState.score += gained;
  ui.score.textContent = String(gameState.score);
  if (gained > 0) flashScoreBox();

  if (merges.length > 0) {
    const maxValue = Math.max(...merges.map((tile) => tile.value));
    if (maxValue >= 128) hapticHeavy();
    else if (maxValue >= 32) hapticMedium();
    else hapticLight();
    playSfx('game2048.merge', { volume: maxValue >= 128 ? 0.7 : 0.45 });
  }

  if (gameState.score > gameState.best) {
    gameState.best = gameState.score;
    setHighScore('game2048', gameState.best);
    ui.best.textContent = String(gameState.best);
    ui.bestScore.textContent = `BEST: ${gameState.best}`;
  }

  const metrics = getBoardMetrics();
  merges.forEach((tile) => {
    const pos = getCellPos(tile.row, tile.col, metrics);
    const style = tileStyle(tile.value);
    const intensity = Math.min(4, Math.log2(tile.value) - 1);
    burstParticles(pos.cx, pos.cy, style.glow, intensity);
    addFloatText(pos.cx, pos.cy - 8, `+${tile.value}`, style.fg);
    if (tile.value >= 128) shake = Math.min(8, 2 + intensity);
  });

  const spawned = addRandomTile(false);
  rebuildTilesList();
  markDirty();
  if (spawned) {
    playSfx('game2048.spawn', { volume: 0.3 });
    anim = { phase: 'spawn', start: performance.now(), tile: spawned, onDone: afterSpawn };
  } else {
    afterSpawn();
  }
}

function afterSpawn() {
  anim = null;

  if (!gameState.won && hasTile(2048)) {
    gameState.won = true;
    hapticSuccess();
    playSfx('game2048.win');
    ui.winScore.textContent = String(gameState.score);
    ui.winOverlay.classList.remove('hidden');
    gameState.state = 'won';
    boardPulse = 1;
    markDirty();
    return;
  }

  if (!canMove()) endGame();
}

function endGame() {
  gameState.state = 'dead';
  hapticHeavy();
  playSfx('game2048.gameover');
  ui.finalScore.textContent = String(gameState.score);
  ui.bestScore.textContent = `BEST: ${gameState.best}`;
  awardAndShowCoins('game2048', gameState.score);
  ui.gameoverOverlay.classList.remove('hidden');
}

function tryMove(direction) {
  if (gameState.state !== 'playing' || anim) return false;

  const { moved, gained, merges } = applyMove(direction);
  if (!moved) return false;

  rebuildTilesList();
  markDirty();
  playSfx('game2048.slide', { volume: 0.22 });

  anim = {
    phase: 'slide',
    start: performance.now(),
    merges,
    gained,
    onDone() {
      if (merges.length > 0) {
        anim = { phase: 'merge', start: performance.now(), merges, gained, onDone: () => finishMove(gained, merges) };
      } else {
        finishMove(gained, merges);
      }
    },
  };

  return true;
}

function boardMetrics() {
  const pad = Math.min(W(), H()) * 0.05;
  const size = Math.min(W(), H()) - pad * 2;
  const gap = size * 0.035;
  const cell = (size - gap * (SIZE + 1)) / SIZE;
  const ox = (W() - size) / 2;
  const oy = (H() - size) / 2;
  return { pad, size, gap, cell, ox, oy };
}

function refreshBoardMetrics() {
  cachedBoardMetrics = boardMetrics();
  tileGradCache.clear();
  const { ox, oy, size, gap, cell } = cachedBoardMetrics;
  const cx = ox + size / 2;
  const cy = oy + size / 2;
  cachedBgGradient = ctx.createRadialGradient(cx, cy, size * 0.1, cx, cy, size * 0.75);
  cachedBgGradient.addColorStop(0, 'rgba(255, 136, 0, 0.12)');
  cachedBgGradient.addColorStop(0.55, 'rgba(255, 0, 255, 0.05)');
  cachedBgGradient.addColorStop(1, 'transparent');

  cellPosCache = new Array(SIZE * SIZE);
  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      const px = ox + gap + x * (cell + gap);
      const py = oy + gap + y * (cell + gap);
      cellPosCache[y * SIZE + x] = {
        x: px,
        y: py,
        cx: px + cell / 2,
        cy: py + cell / 2,
        cell,
      };
    }
  }

  rebuildBoardLayer();
  markDirty();
}

function rebuildBoardLayer() {
  const metrics = cachedBoardMetrics;
  if (!metrics) return;
  const key = [W(), H(), metrics.ox, metrics.oy, metrics.size, metrics.gap, metrics.cell].join('|');
  if (boardLayerKey === key && boardLayerCanvas) return;
  boardLayerKey = key;

  if (!boardLayerCanvas) boardLayerCanvas = document.createElement('canvas');
  boardLayerCanvas.width = W();
  boardLayerCanvas.height = H();
  const bctx = boardLayerCanvas.getContext('2d');
  const { ox, oy, size, cell, gap } = metrics;
  const boardW = cell * SIZE + gap * (SIZE + 1);
  const boardH = boardW;
  const bx = ox - gap * 0.35;
  const by = oy - gap * 0.35;

  bctx.fillStyle = '#050510';
  bctx.fillRect(0, 0, W(), H());
  if (cachedBgGradient) {
    bctx.fillStyle = cachedBgGradient;
    bctx.fillRect(0, 0, W(), H());
  }

  bctx.beginPath();
  roundRectPath(bctx, bx, by, boardW + gap * 0.7, boardH + gap * 0.7, 14);
  bctx.fillStyle = 'rgba(255, 136, 0, 0.06)';
  bctx.fill();
  bctx.strokeStyle = 'rgba(255, 136, 0, 0.22)';
  bctx.lineWidth = 1.5;
  bctx.stroke();

  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      const slot = cellPosCache[y * SIZE + x];
      bctx.beginPath();
      roundRectPath(bctx, slot.x, slot.y, slot.cell, slot.cell, 8);
      bctx.fillStyle = 'rgba(255, 255, 255, 0.025)';
      bctx.fill();
      if (!REDUCED_FX) {
        bctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
        bctx.stroke();
      }
    }
  }

  if (!REDUCED_FX) {
    const corners = [
      [bx + 4, by + 4, 1, 1],
      [bx + boardW + gap * 0.7 - 4, by + 4, -1, 1],
      [bx + 4, by + boardH + gap * 0.7 - 4, 1, -1],
      [bx + boardW + gap * 0.7 - 4, by + boardH + gap * 0.7 - 4, -1, -1],
    ];
    bctx.strokeStyle = 'rgba(255, 136, 0, 0.45)';
    bctx.lineWidth = 2;
    corners.forEach(([px, py, dx, dy]) => {
      bctx.beginPath();
      bctx.moveTo(px, py);
      bctx.lineTo(px + dx * 12, py);
      bctx.moveTo(px, py);
      bctx.lineTo(px, py + dy * 12);
      bctx.stroke();
    });
  }
}

function roundRectPath(targetCtx, x, y, w, h, r) {
  const radius = Math.min(r, w / 2, h / 2);
  targetCtx.moveTo(x + radius, y);
  targetCtx.lineTo(x + w - radius, y);
  targetCtx.quadraticCurveTo(x + w, y, x + w, y + radius);
  targetCtx.lineTo(x + w, y + h - radius);
  targetCtx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
  targetCtx.lineTo(x + radius, y + h);
  targetCtx.quadraticCurveTo(x, y + h, x, y + h - radius);
  targetCtx.lineTo(x, y + radius);
  targetCtx.quadraticCurveTo(x, y, x + radius, y);
  targetCtx.closePath();
}

function getBoardMetrics() {
  if (!cachedBoardMetrics) refreshBoardMetrics();
  return cachedBoardMetrics;
}

function getCellPos(row, col, metrics) {
  if (cellPosCache.length) {
    const base = cellPosCache[Math.round(row) * SIZE + Math.round(col)];
    if (base) return base;
  }
  return cellPos(row, col, metrics, 1);
}

function cellPos(row, col, metrics, slideT) {
  const { gap, cell, ox, oy } = metrics;
  const x = ox + gap + col * (cell + gap);
  const y = oy + gap + row * (cell + gap);
  return { x, y, cx: x + cell / 2, cy: y + cell / 2, cell };
}

function drawRoundedRect(x, y, w, h, r) {
  ctx.beginPath();
  roundRectPath(ctx, x, y, w, h, r);
}

function drawBackground(metrics, now) {
  if (boardLayerCanvas) {
    ctx.drawImage(boardLayerCanvas, 0, 0);
  } else {
    ctx.fillStyle = '#050510';
    ctx.fillRect(0, 0, W(), H());
  }

  if (REDUCED_FX) return;

  bgPhase += 0.012;
  const { ox, oy, size, cell, gap } = metrics;
  const boardW = cell * SIZE + gap * (SIZE + 1);
  const boardH = boardW;
  const bx = ox - gap * 0.35;
  const by = oy - gap * 0.35;

  ctx.strokeStyle = `rgba(255, 136, 0, ${0.08 + Math.sin(bgPhase) * 0.05})`;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  roundRectPath(ctx, bx, by, boardW + gap * 0.7, boardH + gap * 0.7, 14);
  ctx.stroke();

  ctx.strokeStyle = 'rgba(0, 245, 255, 0.06)';
  ctx.lineWidth = 1;
  const scanY = by + ((now * 0.04) % (boardH + gap * 0.7));
  ctx.beginPath();
  ctx.moveTo(bx, scanY);
  ctx.lineTo(bx + boardW + gap * 0.7, scanY);
  ctx.stroke();
}

function drawTile(tile, metrics, now, slideT) {
  const fromRow = tile.prevRow;
  const fromCol = tile.prevCol;
  const toRow = tile.row;
  const toCol = tile.col;
  const row = fromRow + (toRow - fromRow) * slideT;
  const col = fromCol + (toCol - fromCol) * slideT;

  const fromPos = getCellPos(fromRow, fromCol, metrics);
  const toPos = getCellPos(toRow, toCol, metrics);
  const cx = fromPos.cx + (toPos.cx - fromPos.cx) * slideT;
  const cy = fromPos.cy + (toPos.cy - fromPos.cy) * slideT;
  const cell = fromPos.cell + (toPos.cell - fromPos.cell) * slideT;

  const style = tileStyle(tile.value);

  let scale = 1;
  if (tile.spawnT < 1) scale = easeOutBack(tile.spawnT);
  if (tile.mergeT > 0 && tile.mergeT < 1) {
    scale *= 1 + 0.18 * Math.sin(tile.mergeT * Math.PI);
  }

  const size = cell * scale;
  const dx = cx - size / 2;
  const dy = cy - size / 2;

  ctx.save();
  g2048Shadow(style.glow, USE_SHADOWS ? 8 + Math.min(12, Math.log2(tile.value)) : 0);
  drawRoundedRect(dx, dy, size, size, 9);
  ctx.translate(dx, dy);
  ctx.fillStyle = getTileGradient(tile.value, size);
  ctx.fill();
  g2048ClearShadow();

  ctx.strokeStyle = `${style.rim}aa`;
  ctx.lineWidth = 1.5;
  ctx.stroke();

  if (!REDUCED_FX) {
    drawRoundedRect(3, 3, size - 6, (size - 6) * 0.35, 6);
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fill();
  }

  if (tile.value >= 2048) {
    ctx.strokeStyle = 'rgba(255, 224, 102, 0.85)';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  if (USE_SHADOWS) g2048Shadow(style.glow, 10);
  ctx.fillStyle = style.fg;
  ctx.font = getTileFont(tile.value);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(String(tile.value), size / 2, size / 2 + 1);
  g2048ClearShadow();
  ctx.restore();
}

function drawParticles() {
  if (!particles.length) return;
  particles.forEach((p) => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawFloatTexts() {
  if (!floatTexts.length) return;
  floatTexts.forEach((f) => {
    ctx.globalAlpha = f.life;
    ctx.font = '700 13px Orbitron';
    ctx.textAlign = 'center';
    ctx.fillStyle = f.color;
    if (USE_SHADOWS) g2048Shadow(f.color, 6);
    ctx.fillText(f.text, f.x, f.y);
    g2048ClearShadow();
  });
  ctx.globalAlpha = 1;
}

function updateEffects() {
  const hadFx = particles.length > 0 || floatTexts.length > 0 || shake > 0.4 || boardPulse > 0.02;
  particles = particles.filter((p) => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.06;
    p.life -= p.decay;
    return p.life > 0;
  });

  floatTexts = floatTexts.filter((f) => {
    f.y += f.vy;
    f.life -= 0.025;
    return f.life > 0;
  });

  if (shake > 0) shake *= 0.82;
  if (boardPulse > 0) boardPulse *= 0.96;
  if (hadFx || particles.length || floatTexts.length || shake > 0.4 || boardPulse > 0.02) {
    markDirty();
  }
}

function updateAnimation(now) {
  if (!anim) return;

  markDirty();

  if (anim.phase === 'slide') {
    const t = Math.min(1, (now - anim.start) / SLIDE_MS);
    if (t >= 1) anim.onDone();
    return;
  }

  if (anim.phase === 'merge') {
    const t = Math.min(1, (now - anim.start) / MERGE_MS);
    anim.merges.forEach((tile) => { tile.mergeT = t; });
    if (t >= 1) anim.onDone();
    return;
  }

  if (anim.phase === 'spawn') {
    const t = Math.min(1, (now - anim.start) / SPAWN_MS);
    anim.tile.spawnT = easeOutBack(t);
    if (t >= 1) {
      anim.tile.spawnT = 1;
      anim.onDone();
    }
  }
}

function getSlideT(now) {
  if (!anim || anim.phase !== 'slide') return 1;
  return easeOutCubic(Math.min(1, (now - anim.start) / SLIDE_MS));
}

function draw(now) {
  const hasFx = particles.length > 0 || floatTexts.length > 0 || shake > 0.4 || boardPulse > 0.02;
  if (!anim && !hasFx && !needsRedraw) return;

  updateEffects();
  updateAnimation(now);

  const metrics = getBoardMetrics();
  ctx.save();
  if (shake > 0.4) {
    ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
  }

  drawBackground(metrics, now);

  const slideT = getSlideT(now);
  for (let i = 0; i < tilesList.length; i++) {
    drawTile(tilesList[i], metrics, now, slideT);
  }

  drawParticles();
  drawFloatTexts();

  if (boardPulse > 0.02) {
    const { ox, oy, size } = metrics;
    ctx.strokeStyle = `rgba(255, 255, 0, ${boardPulse * 0.35})`;
    ctx.lineWidth = 3;
    drawRoundedRect(ox - 6, oy - 6, size + 12, size + 12, 16);
    ctx.stroke();
  }

  ctx.restore();

  if (!anim && !particles.length && !floatTexts.length && shake <= 0.4 && boardPulse <= 0.02) {
    needsRedraw = false;
  }
  syncRenderLoop();
}

function gameLoop(now) {
  draw(now || performance.now());
}

renderLoop = createRenderLoop(gameLoop, {
  shouldRun: () => true,
});
renderLoop.pause();

document.addEventListener('keydown', (e) => {
  if (gameState.state !== 'playing') return;
  let direction = null;
  if (KEYS.LEFT.includes(e.code)) direction = 'left';
  if (KEYS.RIGHT.includes(e.code)) direction = 'right';
  if (KEYS.UP.includes(e.code)) direction = 'up';
  if (KEYS.DOWN.includes(e.code)) direction = 'down';
  if (direction) {
    e.preventDefault();
    tryMove(direction);
  }
});

let dragStart = null;
let activePointerId = null;

function resolveSwipe(dx, dy) {
  if (Math.abs(dx) < SWIPE_MIN && Math.abs(dy) < SWIPE_MIN) return;
  if (Math.abs(dx) > Math.abs(dy)) tryMove(dx > 0 ? 'right' : 'left');
  else tryMove(dy > 0 ? 'down' : 'up');
}

canvas.addEventListener('pointerdown', (e) => {
  if (gameState.state !== 'playing' || anim) return;
  e.preventDefault();
  dragStart = { x: e.clientX, y: e.clientY };
  activePointerId = e.pointerId;
  canvas.setPointerCapture(e.pointerId);
}, { passive: false });

canvas.addEventListener('pointerup', (e) => {
  if (activePointerId !== e.pointerId || !dragStart) return;
  e.preventDefault();
  resolveSwipe(e.clientX - dragStart.x, e.clientY - dragStart.y);
  dragStart = null;
  activePointerId = null;
  if (canvas.hasPointerCapture(e.pointerId)) canvas.releasePointerCapture(e.pointerId);
}, { passive: false });

canvas.addEventListener('pointercancel', (e) => {
  if (activePointerId !== e.pointerId) return;
  dragStart = null;
  activePointerId = null;
  if (canvas.hasPointerCapture(e.pointerId)) canvas.releasePointerCapture(e.pointerId);
});

document.getElementById('startBtn').addEventListener('click', () => {
  unlockAudio();
  initBoard();
  gameState.state = 'playing';
  beginCoinSession(gameState.best, 'game2048', () => gameState.score);
  ui.startOverlay.classList.add('hidden');
  markDirty();
});

document.getElementById('continueBtn').addEventListener('click', () => {
  gameState.keepPlaying = true;
  gameState.state = 'playing';
  ui.winOverlay.classList.add('hidden');
  markDirty();
});

document.getElementById('restartBtn').addEventListener('click', () => {
  initBoard();
  gameState.state = 'playing';
  beginCoinSession(gameState.best, 'game2048', () => gameState.score);
  ui.gameoverOverlay.classList.add('hidden');
  markDirty();
});

init();
draw(performance.now());
syncRenderLoop();
</script>

</body>
</html>
