<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>CROSSY FROG — ARCADE VAULT</title>
  <link rel="stylesheet" href="../style/game.css">
  <link rel="stylesheet" href="../style/frogger.css">
</head>
<body>

<div class="page">
  <div class="header">
    <a href="../index.html" class="back-btn">🡰 BACK</a>
    <div class="game-title">CROSSY FROG</div>
    <div class="score-display">
      SCORE: <span id="scoreVal">0</span> | BEST: <span id="bestVal">0</span>
    </div>
  </div>

  <div class="game-container">
    <canvas id="c"></canvas>

    <div class="overlay" id="startOverlay">
      <div class="overlay-title" style="color: var(--neon-green); text-shadow: 0 0 30px var(--neon-green);">CROSSY FROG</div>
      <div class="overlay-sub">HOP ACROSS THE ROADS</div>
      <button class="start-btn" id="startBtn">PLAY</button>
    </div>

    <div class="overlay hidden" id="gameoverOverlay">
      <div class="overlay-title" style="color: #ff3344;">SPLAT!</div>
      <div class="overlay-sub">FROG GOT HIT</div>
      <div class="overlay-score" id="finalScore">0</div>
      <div class="overlay-best" id="bestScore">BEST: 0</div>
      <button class="start-btn" id="restartBtn">RETRY</button>
    </div>
  </div>

  <div class="footer">ARROWS / WASD: HOP</div>
</div>

<script src="../js/game.js"></script>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function W() { return canvas.width; }
function H() { return canvas.height; }

let stars = [];

function initStars() {
  const w = W();
  const h = H();
  
  stars = [];
  for (let i = 0; i < 80; i++) {
    stars.push({
      x: Math.random() * w,
      y: Math.random() * h * 0.35,
      size: 0.3 + Math.random() * 1.2,
      alpha: 0.2 + Math.random() * 0.4,
      twinkle: Math.random() * Math.PI * 2
    });
  }
}

const BASE_W = 400, BASE_H = 600;
initGameCommon(canvas, BASE_W, BASE_H, initStars);

function drawStars(time) {
  stars.forEach(s => {
    const twinkle = 0.5 + Math.sin(time * 0.002 + s.twinkle) * 0.5;
    ctx.fillStyle = `rgba(255,255,255,${s.alpha * twinkle})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawMoon() {
  const mx = W() * 0.85;
  const my = 45;
  
  ctx.fillStyle = '#ffffcc';
  ctx.shadowColor = '#ffffcc';
  ctx.shadowBlur = 20;
  ctx.beginPath();
  ctx.arc(mx, my, 18, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  
  ctx.fillStyle = '#050510';
  ctx.beginPath();
  ctx.arc(mx + 5, my - 3, 14, 0, Math.PI * 2);
  ctx.fill();
}

initStars();

const ui = {
  score: document.getElementById('scoreVal'),
  best: document.getElementById('bestVal'),
  finalScore: document.getElementById('finalScore'),
  bestScore: document.getElementById('bestScore'),
  startOverlay: document.getElementById('startOverlay'),
  gameoverOverlay: document.getElementById('gameoverOverlay'),
};

const KEYS = {
  UP: ['ArrowUp', 'KeyW'],
  DOWN: ['ArrowDown', 'KeyS'],
  LEFT: ['ArrowLeft', 'KeyA'],
  RIGHT: ['ArrowRight', 'KeyD'],
};

let lastTime = 0;
let camZ = 0;

let gameState = {
  frog: { x: 5, z: 0, vx: 0, vy: 0, jumping: false },
  maxZ: 0,
  lanes: {},
  state: 'title',
  best: getHighScore('crossyfrog'),
  lastHop: 0,
  jumpAnim: { fromX: 0, fromZ: 0, toX: 0, toZ: 0, startTime: 0, duration: 150 }
};

ui.best.textContent = gameState.best;

function init() {
  gameState.frog = { x: 5, z: 0, vx: 0, vy: 0, jumping: false };
  gameState.maxZ = 0;
  gameState.lanes = {};
  gameState.state = 'title';
  gameState.lastHop = 0;
  gameState.jumpAnim = { fromX: 5, fromZ: 0, toX: 5, toZ: 0, startTime: 0, duration: 150 };

  ui.score.textContent = 0;
  ui.best.textContent = gameState.best;

  ui.startOverlay.classList.remove('hidden');
  ui.gameoverOverlay.classList.add('hidden');

  for (let z = 0; z < 20; z++) {
    gameState.lanes[z] = generateLane(z);
  }
}

function generateLane(z) {
  if (z < 3) return { type: 'grass', z, objects: [], speed: 0, grassDetail: Math.random() };

  const types = ['road','road','water','grass'];
  const type = types[Math.floor(Math.random() * types.length)];

  const lane = { type, z, objects: [], speed: 0, grassDetail: Math.random() };

  if (type === 'road') {
    const speedBase = 2 + z * 0.08;
    lane.speed = (Math.random() > 0.5 ? 1 : -1) * (speedBase + Math.random() * 0.5);
    
    const carColors = ['#ff3344', '#ff8800', '#ff00ff', '#00f5ff'];
    const carTypes = ['sedan', 'truck', 'sport'];
    
    for (let i = 0; i < 3; i++) {
      lane.objects.push({
        x: i * 5 + Math.random() * 2,
        width: 1.2 + Math.random() * 0.5,
        color: carColors[Math.floor(Math.random() * carColors.length)],
        type: carTypes[Math.floor(Math.random() * carTypes.length)]
      });
    }
  }

  if (type === 'water') {
    const speedBase = 1.2 + Math.random() * 0.8;
    lane.speed = (Math.random() > 0.5 ? 1 : -1) * speedBase;

    for (let i = 0; i < 2 + Math.floor(Math.random() * 2); i++) {
      lane.objects.push({
        x: i * 5 + Math.random() * 3,
        width: 2.5 + Math.random() * 1.5,
        type: Math.random() > 0.3 ? 'log' : 'turtle'
      });
    }
  }

  return lane;
}

function screenToGrid(x, z, offsetZ) {
  const size = Math.min(W() / 11, H() / 11);
  return {
    x: W() / 2 + (x - 5.5) * size,
    y: H() - 50 - (z - offsetZ) * size,
    size
  };
}

function drawLane(lane, screenZ, time) {
  const p = screenToGrid(5.5, screenZ, 0);
  const w = W();
  const h = p.size;

  if (lane.type === 'grass') {
    const grad = ctx.createLinearGradient(0, p.y - h, 0, p.y);
    grad.addColorStop(0, '#0a1a0a');
    grad.addColorStop(0.3, '#103010');
    grad.addColorStop(1, '#0a1a0a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, p.y - h, w, h);
    
    ctx.fillStyle = 'rgba(57, 255, 20, 0.1)';
    for (let i = 0; i < 8; i++) {
      const gx = (i * w / 8 + lane.grassDetail * 50 + time * 0.01) % w;
      const gh = 3 + Math.sin(i * 0.5) * 2;
      ctx.fillRect(gx, p.y - h + 2, 1, gh);
    }
    
    ctx.strokeStyle = 'rgba(57, 255, 20, 0.2)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, p.y);
    ctx.lineTo(w, p.y);
    ctx.stroke();
  }

  if (lane.type === 'road') {
    const grad = ctx.createLinearGradient(0, p.y - h, 0, p.y);
    grad.addColorStop(0, '#1a1a1a');
    grad.addColorStop(0.5, '#222');
    grad.addColorStop(1, '#1a1a1a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, p.y - h, w, h);
    
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
    ctx.setLineDash([15, 15]);
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, p.y - h * 0.5);
    ctx.lineTo(w, p.y - h * 0.5);
    ctx.stroke();
    ctx.setLineDash([]);
    
    ctx.strokeStyle = 'rgba(57, 255, 20, 0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, p.y);
    ctx.lineTo(w, p.y);
    ctx.stroke();

    lane.objects.forEach(car => {
      const carP = screenToGrid(car.x, screenZ, 0);
      const carW = car.width * p.size * 0.9;
      const carH = p.size * 0.6;
      
      ctx.shadowColor = car.color;
      ctx.shadowBlur = 8;
      ctx.fillStyle = car.color;
      ctx.fillRect(carP.x - carW/2, carP.y - carH, carW, carH);
      ctx.shadowBlur = 0;
      
      if (car.type === 'truck') {
        ctx.fillStyle = '#333';
        ctx.fillRect(carP.x + carW * 0.3, carP.y - carH * 0.3, carW * 0.3, carH * 0.4);
      }
      
      ctx.fillStyle = '#ffff00';
      ctx.fillRect(carP.x - carW * 0.3, carP.y - carH * 0.2, carW * 0.15, carH * 0.15);
      ctx.fillRect(carP.x + carW * 0.15, carP.y - carH * 0.2, carW * 0.15, carH * 0.15);
    });
  }

  if (lane.type === 'water') {
    const grad = ctx.createLinearGradient(0, p.y - h, 0, p.y);
    grad.addColorStop(0, '#051525');
    grad.addColorStop(0.5, '#0a2040');
    grad.addColorStop(1, '#051525');
    ctx.fillStyle = grad;
    ctx.fillRect(0, p.y - h, w, h);
    
    ctx.fillStyle = 'rgba(57, 255, 20, 0.3)';
    for (let i = 0; i < 3; i++) {
      const waveX = (i * w/3 + time * 0.02) % w;
      ctx.beginPath();
      ctx.moveTo(waveX, p.y - h);
      ctx.quadraticCurveTo(waveX + 10, p.y - h/2, waveX + 20, p.y - h);
      ctx.stroke();
    }
    
    ctx.strokeStyle = 'rgba(57, 255, 20, 0.2)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, p.y);
    ctx.lineTo(w, p.y);
    ctx.stroke();

    lane.objects.forEach(obj => {
      const objP = screenToGrid(obj.x, screenZ, 0);
      const objW = obj.width * p.size * 0.9;
      const objH = p.size * 0.5;
      
      if (obj.type === 'log') {
        const logGrad = ctx.createLinearGradient(objP.x - objW/2, objP.y - objH, objP.x + objW/2, objP.y);
        logGrad.addColorStop(0, '#5a3520');
        logGrad.addColorStop(0.5, '#8B4513');
        logGrad.addColorStop(1, '#5a3520');
        ctx.fillStyle = logGrad;
        ctx.shadowColor = '#8B4513';
        ctx.shadowBlur = 6;
        ctx.fillRect(objP.x - objW/2, objP.y - objH, objW, objH);
        ctx.shadowBlur = 0;
        
        ctx.fillStyle = '#3a2510';
        for (let i = 0; i < 3; i++) {
          const ringX = objP.x - objW/2 + (i + 1) * objW/4;
          ctx.beginPath();
          ctx.arc(ringX, objP.y - objH * 0.5, objH * 0.3, 0, Math.PI * 2);
          ctx.stroke();
        }
      } else {
        ctx.fillStyle = '#2a5a2a';
        ctx.shadowColor = '#39ff14';
        ctx.shadowBlur = 4;
        for (let i = 0; i < 3; i++) {
          const tw = objW / 3;
          const tx = objP.x - objW/2 + i * tw + tw/2;
          ctx.beginPath();
          ctx.ellipse(tx, objP.y - objH * 0.5, tw * 0.4, objH * 0.35, 0, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.shadowBlur = 0;
      }
    });
  }
}

function drawFrog(p, jump, time) {
  const s = p.size * 0.35;
  const bounce = jump * s * 0.3;
  
  ctx.fillStyle = '#0a1a00';
  ctx.beginPath();
  ctx.ellipse(p.x, p.y - s * 0.2 + bounce, s * 1.1, s * 0.5, 0, 0, Math.PI * 2);
  ctx.fill();
  
  const bodyGrad = ctx.createRadialGradient(p.x - s * 0.2, p.y - s * 0.5 + bounce, 0, p.x, p.y - s * 0.3 + bounce, s);
  bodyGrad.addColorStop(0, '#5aff5a');
  bodyGrad.addColorStop(0.6, '#39ff14');
  bodyGrad.addColorStop(1, '#1a5a00');
  ctx.fillStyle = bodyGrad;
  ctx.shadowColor = '#39ff14';
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.ellipse(p.x, p.y - s * 0.4 + bounce, s * 0.8, s * 0.6, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  
  ctx.fillStyle = '#0a1a00';
  ctx.beginPath();
  ctx.ellipse(p.x - s * 0.45, p.y - s * 0.7 + bounce, s * 0.25, s * 0.2, -0.3, 0, Math.PI * 2);
  ctx.ellipse(p.x + s * 0.45, p.y - s * 0.7 + bounce, s * 0.25, s * 0.2, 0.3, 0, Math.PI * 2);
  ctx.fill();
  
  const eyeWhiteGrad = ctx.createRadialGradient(p.x - s * 0.35, p.y - s * 0.75 + bounce, 0, p.x - s * 0.35, p.y - s * 0.75 + bounce, s * 0.2);
  eyeWhiteGrad.addColorStop(0, '#ffffff');
  eyeWhiteGrad.addColorStop(1, '#aaffaa');
  ctx.fillStyle = eyeWhiteGrad;
  ctx.beginPath();
  ctx.arc(p.x - s * 0.35, p.y - s * 0.75 + bounce, s * 0.18, 0, Math.PI * 2);
  ctx.arc(p.x + s * 0.35, p.y - s * 0.75 + bounce, s * 0.18, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.fillStyle = '#000';
  const pupilOffset = Math.sin(time * 0.003) * 1;
  ctx.beginPath();
  ctx.arc(p.x - s * 0.35 + pupilOffset, p.y - s * 0.75 + bounce, s * 0.08, 0, Math.PI * 2);
  ctx.arc(p.x + s * 0.35 + pupilOffset, p.y - s * 0.75 + bounce, s * 0.08, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.fillStyle = '#0a1a00';
  ctx.beginPath();
  ctx.moveTo(p.x - s * 0.1, p.y - s * 0.25 + bounce);
  ctx.lineTo(p.x, p.y - s * 0.15 + bounce - 3);
  ctx.lineTo(p.x + s * 0.1, p.y - s * 0.25 + bounce);
  ctx.fill();
}

function draw() {
  const time = Date.now();
  
  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, W(), H());
  
  drawStars(time);
  drawMoon();

  const offsetZ = Math.max(0, camZ - 8);

  const laneZ = Object.keys(gameState.lanes).map(Number).sort((a, b) => a - b);
  laneZ.forEach(z => {
    const screenZ = z - offsetZ;
    if (screenZ >= -1 && screenZ <= 12) {
      drawLane(gameState.lanes[z], screenZ, time);
    }
  });

  const f = gameState.frog;
  let jump = 0;
  let renderX = f.x;
  let renderZ = f.z;
  
  if (gameState.jumpAnim.startTime > 0) {
    const elapsed = time - gameState.jumpAnim.startTime;
    const progress = Math.min(elapsed / gameState.jumpAnim.duration, 1);
    const jumpPhase = Math.sin(progress * Math.PI);
    jump = jumpPhase;
    
    renderX = gameState.jumpAnim.fromX + (gameState.jumpAnim.toX - gameState.jumpAnim.fromX) * progress;
    renderZ = gameState.jumpAnim.fromZ + (gameState.jumpAnim.toZ - gameState.jumpAnim.fromZ) * progress;
  }
  
  const p = screenToGrid(renderX, renderZ - offsetZ, 0);
  drawFrog(p, jump, time);
}

function update(dt) {
  if (gameState.state !== 'playing') return;

  const f = gameState.frog;

  camZ += (gameState.maxZ - camZ) * 0.08;

  Object.values(gameState.lanes).forEach(lane => {
    if (lane.type === 'road' || lane.type === 'water') {
      lane.objects.forEach(o => {
        o.x += lane.speed * dt;

        if (o.x > 13) o.x = -2;
        if (o.x < -2) o.x = 13;
      });
    }
  });

  const lane = gameState.lanes[Math.floor(f.z)];

  if (lane) {
    if (lane.type === 'road') {
      for (const car of lane.objects) {
        const dx = Math.abs(f.x - car.x);
        if (dx < car.width / 2 + 0.3) {
          endGame();
          return;
        }
      }
    }

    if (lane.type === 'water') {
      let onLog = false;

      for (const log of lane.objects) {
        const center = log.x + log.width / 2;
        const dx = Math.abs(f.x - center);

        if (dx < log.width / 2 - 0.2) {
          onLog = true;
          f.x += lane.speed * dt;
        }
      }

      if (!onLog) {
        endGame();
        return;
      }
      if (f.x < -0.5 || f.x > 11.5) {
        endGame();
        return;
      }
    }
  }

  if (!gameState.lanes[f.z + 12]) {
    for (let i = 0; i < 5; i++) {
      gameState.lanes[f.z + 8 + i] = generateLane(f.z + 8 + i);
    }
  }

  for (const z in gameState.lanes) {
    if (Number(z) < f.z - 25) delete gameState.lanes[z];
  }

  f.x = Math.max(0, Math.min(11, f.x));
}

function endGame() {
  gameState.state = 'dead';

  if (gameState.maxZ > gameState.best) {
    gameState.best = gameState.maxZ;
    setHighScore('crossyfrog', gameState.best);
  }

  ui.finalScore.textContent = gameState.maxZ;
  ui.bestScore.textContent = "BEST: " + gameState.best;
  ui.best.textContent = gameState.best;

  ui.gameoverOverlay.classList.remove('hidden');
}

function gameLoop(t) {
  const dt = (t - lastTime) / 1000;
  lastTime = t;

  update(dt);
  draw();

  requestAnimationFrame(gameLoop);
}

document.addEventListener('keydown', e => {
  if (gameState.state !== 'playing') return;
  if (Date.now() - gameState.lastHop < 150) return;

  const f = gameState.frog;
  let moved = false;

  if (KEYS.UP.includes(e.code)) {
    gameState.jumpAnim = { 
      fromX: f.x, fromZ: f.z, 
      toX: f.x, toZ: f.z + 1, 
      startTime: Date.now(), duration: 150 
    };
    f.z++;
    f.x = Math.round(f.x);
    moved = true;
  }
  if (KEYS.DOWN.includes(e.code) && f.z > 0) {
    gameState.jumpAnim = { 
      fromX: f.x, fromZ: f.z, 
      toX: f.x, toZ: f.z - 1, 
      startTime: Date.now(), duration: 150 
    };
    f.z--;
    f.x = Math.round(f.x);
    moved = true;
  }
  if (KEYS.LEFT.includes(e.code)) {
    gameState.jumpAnim = { 
      fromX: f.x, fromZ: f.z, 
      toX: f.x - 1, toZ: f.z, 
      startTime: Date.now(), duration: 150 
    };
    f.x--;
    moved = true;
  }
  if (KEYS.RIGHT.includes(e.code)) {
    gameState.jumpAnim = { 
      fromX: f.x, fromZ: f.z, 
      toX: f.x + 1, toZ: f.z, 
      startTime: Date.now(), duration: 150 
    };
    f.x++;
    moved = true;
  }

  if (moved) {
    gameState.maxZ = Math.max(gameState.maxZ, f.z);
    ui.score.textContent = gameState.maxZ;
    gameState.lastHop = Date.now();
    e.preventDefault();
  }
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (gameState.state !== 'playing') return;
  
  const rect = canvas.getBoundingClientRect();
  const x = e.touches[0].clientX - rect.left;
  const y = e.touches[0].clientY - rect.top;
  const cx = W() / 2;
  const cy = H() / 2;
  
  const dx = x - cx;
  const dy = y - cy;
  
  if (Math.abs(dx) > 30 || dy < -30) {
    if (Date.now() - gameState.lastHop < 150) return;
    
    const f = gameState.frog;
    let moved = false;
    
    if (dy < -30 && Math.abs(dx) < 30) {
      gameState.jumpAnim = { fromX: f.x, fromZ: f.z, toX: f.x, toZ: f.z + 1, startTime: Date.now(), duration: 150 };
      f.z++;
      moved = true;
    } else if (dy > 30 && f.z > 0) {
      gameState.jumpAnim = { fromX: f.x, fromZ: f.z, toX: f.x, toZ: f.z - 1, startTime: Date.now(), duration: 150 };
      f.z--;
      moved = true;
    } else if (dx < -30) {
      gameState.jumpAnim = { fromX: f.x, fromZ: f.z, toX: f.x - 1, toZ: f.z, startTime: Date.now(), duration: 150 };
      f.x--;
      moved = true;
    } else if (dx > 30) {
      gameState.jumpAnim = { fromX: f.x, fromZ: f.z, toX: f.x + 1, toZ: f.z, startTime: Date.now(), duration: 150 };
      f.x++;
      moved = true;
    }
    
    if (moved) {
      gameState.maxZ = Math.max(gameState.maxZ, f.z);
      ui.score.textContent = gameState.maxZ;
      gameState.lastHop = Date.now();
    }
  }
});

document.getElementById('startBtn').onclick = () => {
  gameState.state = 'playing';
  ui.startOverlay.classList.add('hidden');
};

document.getElementById('restartBtn').onclick = () => {
  init();
  ui.startOverlay.classList.add('hidden');
  gameState.state = 'playing';
};

init();
requestAnimationFrame(gameLoop);

</script>

</body>
</html>
