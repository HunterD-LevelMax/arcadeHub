<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>CROSSY FROG — ARCADE VAULT</title>
  <link rel="stylesheet" href="../style/game.css">
  <link rel="stylesheet" href="../style/frogger.css">
</head>
<body>

  <div class="page">
    <div class="header">
      <a href="../index.html" class="back-btn">🡰 BACK</a>
      <div class="game-title">CROSSY FROG</div>
      <div class="hud">
        <div class="hud-item">
          <div class="hud-label">SCORE</div>
          <div class="hud-val" id="scoreVal">0</div>
        </div>
        <div class="hud-item">
          <div class="hud-label">BEST</div>
          <div class="hud-val" id="bestVal">0</div>
        </div>
        <div class="hud-item">
          <div class="hud-label">LIVES</div>
          <div class="lives-display" id="livesDisplay">
            <span class="life-icon" id="life0">🐸</span>
            <span class="life-icon" id="life1">🐸</span>
            <span class="life-icon" id="life2">🐸</span>
          </div>
        </div>
      </div>
    </div>

    <div class="game-container" id="gameContainer">
      <canvas id="c"></canvas>
      <div id="comboDisplay"></div>

      <div class="overlay" id="startOverlay">
        <div class="overlay-title" style="color: var(--game-accent); text-shadow: 0 0 30px var(--game-accent);">CROSSY FROG</div>
        <div class="overlay-sub">HOP ACROSS ROADS & RIVERS<br>DON'T GET SQUASHED OR DROWN</div>
        <button class="start-btn" id="startBtn">▶ PLAY</button>
        <div class="controls-hint">
          <div class="key-hint">
            <div class="key-icon">↑</div>
            <div>HOP</div>
          </div>
          <div class="key-hint">
            <div class="key-icon">←→</div>
            <div>SIDESTEP</div>
          </div>
          <div class="key-hint">
            <div class="key-icon">↓</div>
            <div>BACK</div>
          </div>
        </div>
      </div>

      <div class="overlay hidden" id="gameoverOverlay">
        <div class="overlay-title" style="color: #ff3344;" id="deathTitle">SPLAT!</div>
        <div class="overlay-sub" id="deathMsg">FROG GOT HIT</div>
        <div class="overlay-score" id="finalScore">0</div>
        <div class="overlay-best" id="bestScore">BEST: 0</div>
        <button class="start-btn" id="restartBtn">↺ RETRY</button>
      </div>
    </div>

    <div class="footer">ARROWS / WASD: HOP · SWIPE ON MOBILE</div>
  </div>

<script src="../js/game.js"></script>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const container = document.getElementById('gameContainer');

function W() { return canvas.width; }
function H() { return canvas.height; }

function resizeCanvas() {
  const rect = container.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;
  initStars();
}
window.addEventListener('resize', resizeCanvas);

const ui = {
  score: document.getElementById('scoreVal'),
  best: document.getElementById('bestVal'),
  finalScore: document.getElementById('finalScore'),
  bestScore: document.getElementById('bestScore'),
  startOverlay: document.getElementById('startOverlay'),
  gameoverOverlay: document.getElementById('gameoverOverlay'),
  comboDisplay: document.getElementById('comboDisplay'),
  deathTitle: document.getElementById('deathTitle'),
  deathMsg: document.getElementById('deathMsg'),
};

const LIVES_MAX = 3;

function getLiveIcons() {
  return [
    document.getElementById('life0'),
    document.getElementById('life1'),
    document.getElementById('life2'),
  ];
}

function updateLivesUI(lives) {
  getLiveIcons().forEach((el, i) => {
    if (i < lives) { el.classList.remove('lost'); }
    else { el.classList.add('lost'); }
  });
}

let stars = [];
function initStars() {
  stars = Array.from({ length: 80 }, () => ({
    x: Math.random() * W(),
    y: Math.random() * H() * 0.3,
    size: 0.3 + Math.random() * 1.2,
    alpha: 0.2 + Math.random() * 0.4,
    twinkle: Math.random() * Math.PI * 2
  }));
}

function drawStars(time) {
  stars.forEach(s => {
    const tw = 0.5 + Math.sin(time * 0.001 + s.twinkle) * 0.5;
    ctx.fillStyle = `rgba(255,255,255,${s.alpha * tw})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawMoon(time) {
  const mx = W() * 0.85, my = 40;
  const gPulse = 0.8 + Math.sin(time * 0.0005) * 0.2;
  ctx.shadowColor = '#ffffcc';
  ctx.shadowBlur = 20 * gPulse;
  ctx.fillStyle = '#ffffcc';
  ctx.beginPath();
  ctx.arc(mx, my, 18, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#050510';
  ctx.beginPath();
  ctx.arc(mx + 5, my - 3, 14, 0, Math.PI * 2);
  ctx.fill();
}

function getGridSize() {
  return Math.min(W() / 12, H() / 13);
}

function gridToScreen(gx, gz, offsetZ) {
  const sz = getGridSize();
  const originX = W() / 2 - 5.5 * sz;
  const originY = H() - sz * 2;
  return {
    x: originX + gx * sz,
    y: originY - (gz - offsetZ) * sz,
    sz
  };
}

const COLORS = {
  car: ['#ff3344','#ff8800','#ff00ff','#00f5ff','#ffff00'],
  log: '#8B4513'
};

function generateLane(z) {
  if (z <= 0) return { type: 'safe', z, objects: [], speed: 0 };
  if (z === 1 || z === 2) return { type: 'grass', z, objects: [], speed: 0 };

  if (z % 8 === 0) return { type: 'safe', z, objects: [], speed: 0 };

  const roll = Math.random();
  const diffFactor = Math.min(z / 40, 1);

  let type;
  if (z < 5) { type = roll < 0.5 ? 'road' : 'grass'; }
  else { type = roll < 0.45 ? 'road' : roll < 0.75 ? 'water' : 'grass'; }

  const lane = { type, z, objects: [], speed: 0 };

  if (type === 'road') {
    const baseSpeed = 1.5 + diffFactor * 3.5;
    lane.speed = (Math.random() > 0.5 ? 1 : -1) * (baseSpeed + Math.random());
    const count = 2 + Math.floor(diffFactor * 3);
    for (let i = 0; i < count; i++) {
      lane.objects.push({
        x: (i / count) * 11 + Math.random() * 1.5,
        width: 1.1 + Math.random() * 0.7 + diffFactor * 0.4,
        color: COLORS.car[Math.floor(Math.random() * COLORS.car.length)],
        isTruck: Math.random() < 0.25 + diffFactor * 0.15
      });
    }
  }

  if (type === 'water') {
    const baseSpeed = 1 + diffFactor * 1.5;
    lane.speed = (Math.random() > 0.5 ? 1 : -1) * (baseSpeed + Math.random() * 0.5);
    const count = 2 + Math.floor(Math.random() * 2);
    for (let i = 0; i < count; i++) {
      lane.objects.push({
        x: (i / count) * 11 + Math.random() * 2,
        width: 2.2 + Math.random() * 1.8,
        isTurtle: Math.random() < 0.25
      });
    }
  }

  return lane;
}

let particles = [];

function spawnParticles(x, y, color, count, type = 'burst') {
  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2 + Math.random() * 0.5;
    const speed = type === 'splash' ? 1 + Math.random() * 3 : 0.5 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - (type === 'jump' ? 3 : 0),
      alpha: 1,
      size: 2 + Math.random() * 4,
      color,
      life: 1,
      decay: 0.04 + Math.random() * 0.04,
      gravity: type === 'burst' ? 0.15 : 0.05
    });
  }
}

function updateParticles() {
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += p.gravity;
    p.life -= p.decay;
    p.alpha = Math.max(0, p.life);
  });
  particles = particles.filter(p => p.life > 0);
}

function drawParticles() {
  particles.forEach(p => {
    if (p.life <= 0 || p.size <= 0) return;
    const r = p.size * p.life;
    if (r <= 0) return;
    ctx.globalAlpha = Math.max(0, Math.min(1, p.alpha));
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

function drawLane(lane, screenZ, time) {
  const p0 = gridToScreen(0, screenZ, 0);
  const sz = p0.sz;
  const y = p0.y - sz;
  const w = W();

  if (lane.type === 'safe' || lane.type === 'grass') {
    const baseColor = lane.type === 'safe' ? '#0d2a0d' : '#0a1a0a';
    const lineColor = lane.type === 'safe' ? 'rgba(57,255,20,0.4)' : 'rgba(57,255,20,0.15)';
    ctx.fillStyle = baseColor;
    ctx.fillRect(0, y, w, sz);
    if (lane.type === 'safe') {
      ctx.fillStyle = 'rgba(57,255,20,0.08)';
      for (let i = 0; i < 5; i++) {
        ctx.beginPath();
        ctx.arc(w * (i + 0.5) / 5, y + sz / 2, sz * 0.35, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.strokeStyle = lineColor;
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, y + sz); ctx.lineTo(w, y + sz); ctx.stroke();
    return;
  }

  if (lane.type === 'road') {
    ctx.fillStyle = '#181818';
    ctx.fillRect(0, y, w, sz);
    ctx.setLineDash([sz * 0.4, sz * 0.3]);
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, y + sz / 2); ctx.lineTo(w, y + sz / 2); ctx.stroke();
    ctx.setLineDash([]);
    ctx.strokeStyle = 'rgba(255,51,68,0.25)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, y + sz); ctx.lineTo(w, y + sz); ctx.stroke();

    lane.objects.forEach(car => {
      const cp = gridToScreen(car.x + car.width / 2, screenZ, 0);
      const cw = car.width * sz * 0.88;
      const ch = car.isTruck ? sz * 0.72 : sz * 0.6;
      const cx = cp.x - cw / 2;
      const cy = cp.y - ch;

      ctx.shadowColor = car.color;
      ctx.shadowBlur = 12;
      ctx.fillStyle = car.color;
      ctx.beginPath();
      ctx.roundRect(cx, cy, cw, ch, 3);
      ctx.fill();
      ctx.shadowBlur = 0;

      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      const ws = lane.speed > 0 ? 0.55 : 0.1;
      ctx.fillRect(cx + cw * ws, cy + ch * 0.1, cw * 0.3, ch * 0.35);

      ctx.shadowColor = '#ffff88';
      ctx.shadowBlur = 8;
      ctx.fillStyle = '#ffff88';
      const hlSide = lane.speed > 0 ? cx + cw - cw * 0.1 : cx;
      ctx.fillRect(hlSide, cy + ch * 0.15, cw * 0.08, ch * 0.2);
      ctx.fillRect(hlSide, cy + ch * 0.6, cw * 0.08, ch * 0.2);
      ctx.shadowBlur = 0;

      ctx.fillStyle = '#111';
      ctx.fillRect(cx + cw * 0.1, cy + ch - 3, cw * 0.25, 4);
      ctx.fillRect(cx + cw * 0.65, cy + ch - 3, cw * 0.25, 4);
    });
  }

  if (lane.type === 'water') {
    const grad = ctx.createLinearGradient(0, y, 0, y + sz);
    grad.addColorStop(0, '#041a2f');
    grad.addColorStop(0.5, '#062840');
    grad.addColorStop(1, '#041a2f');
    ctx.fillStyle = grad;
    ctx.fillRect(0, y, w, sz);

    const wOff = (time * 0.04 * Math.abs(lane.speed || 1)) % (w * 0.5);
    ctx.fillStyle = 'rgba(0,245,255,0.06)';
    for (let i = -1; i < 4; i++) {
      const wx = (i * w * 0.5 + wOff) % w;
      ctx.beginPath();
      for (let t2 = 0; t2 < 1; t2 += 0.05) {
        const wx2 = wx + t2 * w * 0.5;
        const wy = y + sz / 2 + Math.sin(t2 * Math.PI * 4) * sz * 0.1;
        t2 === 0 ? ctx.moveTo(wx2, wy) : ctx.lineTo(wx2, wy);
      }
      ctx.stroke();
    }

    ctx.strokeStyle = 'rgba(0,245,255,0.2)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, y + sz); ctx.lineTo(w, y + sz); ctx.stroke();

    lane.objects.forEach(obj => {
      const op = gridToScreen(obj.x + obj.width / 2, screenZ, 0);
      const ow = obj.width * sz * 0.88;
      const oh = sz * 0.5;
      const ox = op.x - ow / 2;
      const oy = op.y - oh;

      if (!obj.isTurtle) {
        const logGrad = ctx.createLinearGradient(ox, oy, ox, oy + oh);
        logGrad.addColorStop(0, '#6b3a1f');
        logGrad.addColorStop(0.4, '#8B4513');
        logGrad.addColorStop(1, '#5a2e0f');
        ctx.shadowColor = '#8B4513';
        ctx.shadowBlur = 6;
        ctx.fillStyle = logGrad;
        ctx.beginPath();
        ctx.roundRect(ox, oy, ow, oh, oh / 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = 'rgba(0,0,0,0.3)';
        ctx.lineWidth = 1;
        for (let i = 1; i < 4; i++) {
          ctx.beginPath();
          ctx.moveTo(ox + ow * i / 4, oy + 2);
          ctx.lineTo(ox + ow * i / 4, oy + oh - 2);
          ctx.stroke();
        }
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.beginPath();
        ctx.ellipse(ox + ow * 0.3, oy + oh * 0.5, oh * 0.18, oh * 0.25, 0, 0, Math.PI * 2);
        ctx.fill();
      } else {
        const tCount = Math.max(2, Math.floor(obj.width));
        const tw = ow / tCount;
        for (let ti = 0; ti < tCount; ti++) {
          const tx = ox + ti * tw + tw / 2;
          const ty = oy + oh / 2;
          ctx.shadowColor = '#2a8a2a';
          ctx.shadowBlur = 5;
          ctx.fillStyle = '#1a5a1a';
          ctx.beginPath();
          ctx.ellipse(tx, ty, tw * 0.42, oh * 0.45, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = '#39ff14';
          ctx.lineWidth = 0.5;
          ctx.globalAlpha = 0.4;
          ctx.beginPath();
          ctx.arc(tx, ty, tw * 0.25, 0, Math.PI * 2);
          ctx.stroke();
          ctx.globalAlpha = 1;
          ctx.shadowBlur = 0;
          ctx.fillStyle = '#fff';
          ctx.beginPath();
          ctx.arc(tx - tw * 0.12, ty - oh * 0.15, 2, 0, Math.PI * 2);
          ctx.arc(tx + tw * 0.12, ty - oh * 0.15, 2, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#000';
          ctx.beginPath();
          ctx.arc(tx - tw * 0.12, ty - oh * 0.15, 1, 0, Math.PI * 2);
          ctx.arc(tx + tw * 0.12, ty - oh * 0.15, 1, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    });
  }
}

function drawFrog(px, py, sz, jumpT, direction, invincibleFlash) {
  if (invincibleFlash && Math.floor(Date.now() / 80) % 2 === 0) return;

  const s = sz * 0.4;
  const bounce = Math.sin(jumpT * Math.PI) * s * 0.8;
  const squashX = jumpT > 0 ? (1 - Math.sin(jumpT * Math.PI) * 0.2) : 1;
  const squashY = jumpT > 0 ? (1 + Math.sin(jumpT * Math.PI) * 0.3) : 1;

  ctx.save();
  ctx.translate(px, py - bounce);

  ctx.globalAlpha = 0.3 - bounce / (s * 5);
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(0, bounce + s * 0.15, s * squashX * 0.9, s * 0.25, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  const legBounce = Math.sin(jumpT * Math.PI) * s * 0.4;
  ctx.fillStyle = '#1a5a00';
  ctx.beginPath();
  ctx.ellipse(-s * 0.7 * squashX, s * 0.2 - legBounce * 0.3, s * 0.35, s * 0.2, -0.4, 0, Math.PI * 2);
  ctx.ellipse(s * 0.7 * squashX, s * 0.2 - legBounce * 0.3, s * 0.35, s * 0.2, 0.4, 0, Math.PI * 2);
  ctx.fill();

  const bodyGrad = ctx.createRadialGradient(-s * 0.2, -s * 0.3, 0, 0, 0, s);
  bodyGrad.addColorStop(0, '#7aff3a');
  bodyGrad.addColorStop(0.5, '#39ff14');
  bodyGrad.addColorStop(1, '#1a6a00');
  ctx.fillStyle = bodyGrad;
  ctx.shadowColor = '#39ff14';
  ctx.shadowBlur = 14;
  ctx.beginPath();
  ctx.ellipse(0, 0, s * 0.85 * squashX, s * 0.65 * squashY, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  ctx.fillStyle = 'rgba(180,255,120,0.3)';
  ctx.beginPath();
  ctx.ellipse(0, s * 0.1, s * 0.45, s * 0.3, 0, 0, Math.PI * 2);
  ctx.fill();

  const eyeOffset = s * 0.35 * squashX;
  const eyeY = -s * 0.55 * squashY;
  const pupilDir = { x: 0, y: -1 };

  for (const ex of [-eyeOffset, eyeOffset]) {
    ctx.fillStyle = '#0a2a00';
    ctx.beginPath();
    ctx.ellipse(ex, eyeY - s * 0.1, s * 0.22, s * 0.18, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#eeffee';
    ctx.shadowColor = '#fff';
    ctx.shadowBlur = 4;
    ctx.beginPath();
    ctx.arc(ex, eyeY, s * 0.17, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(ex + pupilDir.x * s * 0.04, eyeY + pupilDir.y * s * 0.04, s * 0.08, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.beginPath();
    ctx.arc(ex - s * 0.04, eyeY - s * 0.06, s * 0.04, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.strokeStyle = '#0a2a00';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(0, s * 0.05, s * 0.3, 0.3, Math.PI - 0.3);
  ctx.stroke();

  ctx.restore();
}

let gameState;
let camZ = 0;
let lastTime = 0;
let rafId = null;

function init() {
  camZ = 0;
  particles = [];

  const best = getHighScore('crossyfrog');

  gameState = {
    frog: { x: 5.5, z: 0 },
    maxZ: 0,
    lanes: {},
    state: 'title',
    best,
    lives: LIVES_MAX,
    score: 0,
    combo: 0,
    lastHop: 0,
    invincibleUntil: 0,
    jumpAnim: { fromX: 5.5, fromZ: 0, toX: 5.5, toZ: 0, startTime: 0, duration: 160 },
    deathAnim: 0,
  };

  for (let z = -1; z < 25; z++) {
    gameState.lanes[z] = generateLane(z);
  }

  ui.score.textContent = 0;
  ui.best.textContent = best;
  ui.bestScore.textContent = 'BEST: ' + best;
  updateLivesUI(LIVES_MAX);

  ui.startOverlay.classList.remove('hidden');
  ui.gameoverOverlay.classList.add('hidden');
  ui.comboDisplay.style.opacity = '0';
}

function spawnScorePopup(text, x, y, color) {
  const el = document.createElement('div');
  el.className = 'score-popup';
  el.textContent = text;
  el.style.cssText = `left:${x}px;top:${y}px;font-size:16px;color:${color};text-shadow:0 0 8px ${color};`;
  container.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

function updateComboUI() {
  const c = gameState.combo;
  if (c >= 3) {
    ui.comboDisplay.textContent = `✕${c} COMBO!`;
    ui.comboDisplay.style.opacity = '1';
    ui.comboDisplay.style.fontSize = Math.min(13 + c * 1.5, 26) + 'px';
  } else {
    ui.comboDisplay.style.opacity = '0';
  }
}

function checkCollision() {
  const f = gameState.frog;
  const z = Math.round(f.z);
  const lane = gameState.lanes[z];
  if (!lane) return;

  if (Date.now() < gameState.invincibleUntil) return;

  if (lane.type === 'road') {
    for (const car of lane.objects) {
      const carLeft = car.x;
      const carRight = car.x + car.width;
      const margin = 0.35;
      if (f.x > carLeft + margin && f.x < carRight - margin) {
        triggerDeath('road', car.color);
        return;
      }
    }
  }

  if (lane.type === 'water') {
    let onPlatform = false;
    for (const obj of lane.objects) {
      const left = obj.x;
      const right = obj.x + obj.width;
      if (f.x >= left + 0.15 && f.x <= right - 0.15) {
        onPlatform = true;
        break;
      }
    }
    if (!onPlatform) {
      triggerDeath('water', '#00f5ff');
    }
  }
}

function triggerDeath(cause, color) {
  if (gameState.state !== 'playing') return;
  gameState.state = 'dying';
  gameState.combo = 0;
  updateComboUI();

  const p = gridToScreen(gameState.frog.x, gameState.frog.z - camZ, 0);
  if (cause === 'road') {
    spawnParticles(p.x, p.y, color, 20, 'burst');
    spawnParticles(p.x, p.y, '#39ff14', 12, 'burst');
  } else {
    spawnParticles(p.x, p.y, '#00f5ff', 20, 'splash');
    spawnParticles(p.x, p.y, '#fff', 8, 'splash');
  }

  gameState.lives--;
  updateLivesUI(gameState.lives);

  setTimeout(() => {
    if (gameState.lives > 0) {
      gameState.frog.x = 5.5;
      gameState.frog.z = Math.max(0, gameState.maxZ - 1);
      gameState.invincibleUntil = Date.now() + 2000;
      gameState.state = 'playing';
    } else {
      endGame(cause);
    }
  }, 700);
}

function endGame(cause) {
  gameState.state = 'dead';

  const isNew = gameState.maxZ > gameState.best;
  if (isNew) {
    gameState.best = gameState.maxZ;
    setHighScore('crossyfrog', gameState.best);
  }

  ui.finalScore.textContent = gameState.maxZ;
  ui.bestScore.textContent = (isNew ? '🏆 NEW BEST: ' : 'BEST: ') + gameState.best;
  ui.best.textContent = gameState.best;

  const msgs = {
    road: ['SPLAT!', 'ROAD PIZZA 🍕', 'SQUISHED!'],
    water: ['BLUB BLUB...', 'POND DIVE', 'DROWNED!'],
  };
  const deathMsgs = { road: 'FROG GOT HIT BY A CAR', water: 'FROG FELL IN THE WATER' };
  const titles = msgs[cause] || ['GAME OVER'];
  ui.deathTitle.textContent = titles[Math.floor(Math.random() * titles.length)];
  ui.deathTitle.style.color = cause === 'road' ? '#ff3344' : '#00f5ff';
  ui.deathMsg.textContent = deathMsgs[cause] || 'FROG MET THEIR END';

  ui.gameoverOverlay.classList.remove('hidden');
}

function hop(dx, dz) {
  if (gameState.state !== 'playing') return;
  if (performance.now() - gameState.lastHop < 160) return;
  gameState.lastHop = performance.now();

  const f = gameState.frog;
  const newZ = f.z + dz;
  const newX = f.x + dx;

  if (newX < 0 || newX > 11) return;
  if (newZ < 0) return;

  gameState.jumpAnim = {
    fromX: f.x, fromZ: f.z,
    toX: newX, toZ: newZ,
    startTime: performance.now(), duration: 160
  };

  f.x = newX;
  f.z = newZ;

  const p = gridToScreen(f.x, f.z - camZ, 0);
  spawnParticles(p.x, p.y, '#39ff14', 5, 'jump');

  if (dz > 0) {
    const prevMax = gameState.maxZ;
    gameState.maxZ = Math.max(gameState.maxZ, Math.round(f.z));
    if (Math.round(f.z) > prevMax) {
      gameState.combo++;
      updateComboUI();
      const pts = gameState.combo >= 5 ? 5 : gameState.combo >= 3 ? 2 : 1;
      gameState.score += pts;
      ui.score.textContent = gameState.maxZ;

      const pp = gridToScreen(f.x, f.z - camZ, 0);
      const color = pts >= 5 ? '#ffff00' : pts >= 2 ? '#ff00ff' : '#39ff14';
      const text = pts >= 5 ? `+${pts} 🔥` : pts >= 2 ? `+${pts} COMBO` : '+1';
      spawnScorePopup(text, pp.x - 20, pp.y - 30, color);
    }
  } else {
    gameState.combo = 0;
    updateComboUI();
  }

  if (!gameState.lanes[Math.round(f.z) + 15]) {
    for (let i = 0; i < 8; i++) {
      const nz = Math.round(f.z) + 10 + i;
      if (!gameState.lanes[nz]) gameState.lanes[nz] = generateLane(nz);
    }
  }
  for (const z in gameState.lanes) {
    if (Number(z) < f.z - 30) delete gameState.lanes[z];
  }

}

function update(dt) {
  if (gameState.state !== 'playing' && gameState.state !== 'dying') return;

  const targetCamZ = Math.max(0, gameState.frog.z - 4);
  camZ += (targetCamZ - camZ) * 0.12;

  Object.values(gameState.lanes).forEach(lane => {
    if (lane.speed === 0) return;
    lane.objects.forEach(o => {
      o.x += lane.speed * dt;
      if (o.x > 13) o.x -= 14;
      if (o.x < -3) o.x += 14;
    });
  });

  const f = gameState.frog;
  const fLane = gameState.lanes[Math.round(f.z)];
  if (fLane && fLane.type === 'water' && gameState.state === 'playing') {
    for (const obj of fLane.objects) {
      if (f.x >= obj.x + 0.1 && f.x <= obj.x + obj.width - 0.1) {
        f.x += fLane.speed * dt;
        f.x = Math.max(0, Math.min(11, f.x));
        break;
      }
    }
  }

  updateParticles();

  if (gameState.state === 'playing') {
    checkCollision();
  }
}

function draw(time) {
  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, W(), H());

  drawStars(time);
  drawMoon(time);

  const offsetZ = Math.max(0, camZ);

  const laneKeys = Object.keys(gameState.lanes).map(Number).sort((a, b) => a - b);
  laneKeys.forEach(z => {
    const screenZ = z - offsetZ;
    if (screenZ >= -1 && screenZ <= 14) {
      drawLane(gameState.lanes[z], screenZ, time);
    }
  });

  const f = gameState.frog;
  let renderX = f.x, renderZ = f.z;
  let jumpT = 0;

  if (gameState.jumpAnim.startTime > 0) {
    const elapsed = time - gameState.jumpAnim.startTime;
    const prog = Math.min(elapsed / gameState.jumpAnim.duration, 1);
    jumpT = prog < 1 ? prog : 0;
    renderX = gameState.jumpAnim.fromX + (gameState.jumpAnim.toX - gameState.jumpAnim.fromX) * prog;
    renderZ = gameState.jumpAnim.fromZ + (gameState.jumpAnim.toZ - gameState.jumpAnim.fromZ) * prog;
    if (prog >= 1) gameState.jumpAnim.startTime = 0;
  }

  const fp = gridToScreen(renderX, renderZ - offsetZ, 0);
  const invincible = Date.now() < gameState.invincibleUntil;
  drawFrog(fp.x, fp.y, fp.sz, jumpT, 0, invincible);

  drawParticles();

  if (invincible) {
    const remaining = (gameState.invincibleUntil - Date.now()) / 2000;
    ctx.globalAlpha = remaining * 0.3;
    ctx.strokeStyle = '#39ff14';
    ctx.lineWidth = 2;
    ctx.shadowColor = '#39ff14';
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.arc(fp.x, fp.y, fp.sz * 0.6, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  }
}

function gameLoop(ts) {
  rafId = requestAnimationFrame(gameLoop);
  
  const frameInterval = 1000 / 60;
  const deltaTime = ts - lastTime;
  
  if (deltaTime < frameInterval) return;
  
  lastTime = ts - (deltaTime % frameInterval);
  const dt = Math.min((deltaTime) / 1000, 0.05);
  
  update(dt);
  draw(ts);
}

const KEYS_UP = ['ArrowUp', 'KeyW'];
const KEYS_DOWN = ['ArrowDown', 'KeyS'];
const KEYS_LEFT = ['ArrowLeft', 'KeyA'];
const KEYS_RIGHT = ['ArrowRight', 'KeyD'];

document.addEventListener('keydown', e => {
  if (gameState.state !== 'playing') return;
  if (KEYS_UP.includes(e.code)) { hop(0, 1); e.preventDefault(); }
  else if (KEYS_DOWN.includes(e.code)) { hop(0, -1); e.preventDefault(); }
  else if (KEYS_LEFT.includes(e.code)) { hop(-1, 0); e.preventDefault(); }
  else if (KEYS_RIGHT.includes(e.code)) { hop(1, 0); e.preventDefault(); }
});

let touchStart = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  touchStart = null;

  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist < 15) {
    hop(0, 1);
    return;
  }

  if (Math.abs(dx) > Math.abs(dy)) {
    hop(dx > 0 ? 1 : -1, 0);
  } else {
    hop(0, dy < 0 ? 1 : -1);
  }
}, { passive: false });

document.getElementById('startBtn').onclick = () => {
  gameState.state = 'playing';
  ui.startOverlay.classList.add('hidden');
  lastTime = performance.now();
};

document.getElementById('restartBtn').onclick = () => {
  ui.gameoverOverlay.classList.add('hidden');
  init();
  gameState.state = 'playing';
  lastTime = performance.now();
};

resizeCanvas();
init();
lastTime = performance.now();
rafId = requestAnimationFrame(gameLoop);

</script>

</body>
