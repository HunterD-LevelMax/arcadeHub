<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>CROSSY FROG — ARCADE VAULT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style/game.css">
  <link rel="stylesheet" href="../style/frogger.css">
</head>
<body>

  <div class="page">
    <div class="header">
      <a href="../index.html" class="back-btn">🡰 BACK</a>
      <div class="game-title">CROSSY FROG</div>
      <div class="hud">
        <div class="hud-item">
          <div class="hud-label">SCORE</div>
          <div class="hud-val" id="scoreVal">0</div>
        </div>
        <div class="hud-item">
          <div class="hud-label">BEST</div>
          <div class="hud-val" id="bestVal">0</div>
        </div>
        <div class="hud-item">
          <div class="hud-label">LIVES</div>
          <div class="lives-display" id="livesDisplay">
            <span class="life-icon" id="life0">🐸</span>
            <span class="life-icon" id="life1">🐸</span>
            <span class="life-icon" id="life2">🐸</span>
          </div>
        </div>
      </div>
    </div>

    <div class="game-container" id="gameContainer">
      <canvas id="c"></canvas>
      <div id="comboDisplay"></div>

      <div class="overlay" id="startOverlay">
        <div class="overlay-title">CROSSY FROG</div>
        <div class="overlay-sub">HOP ACROSS ROADS & RIVERS<br>DON'T GET SQUASHED OR DROWN</div>
        <button class="start-btn" id="startBtn">▶ PLAY</button>
        <div class="controls-hint">
          <div class="key-hint"><div class="key-icon">↑</div><div>HOP</div></div>
          <div class="key-hint"><div class="key-icon">←→</div><div>SIDESTEP</div></div>
          <div class="key-hint"><div class="key-icon">↓</div><div>BACK</div></div>
        </div>
      </div>

      <div class="overlay hidden" id="gameoverOverlay">
        <div class="overlay-title" id="deathTitle">SPLAT!</div>
        <div class="overlay-sub" id="deathMsg">FROG GOT HIT</div>
        <div class="overlay-score" id="finalScore">0</div>
        <div class="overlay-best" id="bestScore">BEST: 0</div>
        <button class="start-btn" id="restartBtn">↺ RETRY</button>
      </div>
    </div>

    <div class="footer">ARROWS / WASD: HOP · SWIPE ON MOBILE</div>
  </div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const container = document.getElementById('gameContainer');

function W() { return canvas.width; }
function H() { return canvas.height; }

// ── helpers for persistent score ──────────────────────────────────────────────
function getHighScore(key) { try { return parseInt(localStorage.getItem('hs_' + key)) || 0; } catch { return 0; } }
function setHighScore(key, v) { try { localStorage.setItem('hs_' + key, v); } catch {} }

// ── canvas sizing ─────────────────────────────────────────────────────────────
function resizeCanvas() {
  const rect = container.getBoundingClientRect();
  canvas.width  = rect.width;
  canvas.height = rect.height;
  initStars();
}
window.addEventListener('resize', resizeCanvas);

// ── UI refs ───────────────────────────────────────────────────────────────────
const ui = {
  score:          document.getElementById('scoreVal'),
  best:           document.getElementById('bestVal'),
  finalScore:     document.getElementById('finalScore'),
  bestScore:      document.getElementById('bestScore'),
  startOverlay:   document.getElementById('startOverlay'),
  gameoverOverlay:document.getElementById('gameoverOverlay'),
  comboDisplay:   document.getElementById('comboDisplay'),
  deathTitle:     document.getElementById('deathTitle'),
  deathMsg:       document.getElementById('deathMsg'),
};
const LIVES_MAX = 3;
function getLiveIcons() { return [0,1,2].map(i => document.getElementById('life'+i)); }
function updateLivesUI(lives) {
  getLiveIcons().forEach((el, i) => el.classList.toggle('lost', i >= lives));
}

// ── stars / moon (decorative) ─────────────────────────────────────────────────
let stars = [];
function initStars() {
  stars = Array.from({ length: 80 }, () => ({
    x: Math.random() * W(), y: Math.random() * H() * 0.3,
    size: 0.3 + Math.random() * 1.2,
    alpha: 0.2 + Math.random() * 0.4,
    twinkle: Math.random() * Math.PI * 2
  }));
}
function drawStars(time) {
  stars.forEach(s => {
    const tw = 0.5 + Math.sin(time * 0.001 + s.twinkle) * 0.5;
    ctx.fillStyle = `rgba(255,255,255,${s.alpha * tw})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
  });
}
function drawMoon(time) {
  const mx = W()*0.85, my = 40, gp = 0.8 + Math.sin(time*0.0005)*0.2;
  ctx.shadowColor = '#ffffcc'; ctx.shadowBlur = 20*gp;
  ctx.fillStyle = '#ffffcc';
  ctx.beginPath(); ctx.arc(mx, my, 18, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#050510';
  ctx.beginPath(); ctx.arc(mx+5, my-3, 14, 0, Math.PI*2); ctx.fill();
}

// ── GRID ──────────────────────────────────────────────────────────────────────
// Grid: 11 columns (x 0..10), rows increase upward (z).
// Frog starts at x=5 (integer), z=0.
// gridToScreen maps (gx, gz) → pixel centre of that cell.
const GRID_COLS = 11;   // columns 0..10

function getGridSize() {
  // fit 11 columns in width, ~14 rows in height
  return Math.min(W() / GRID_COLS, H() / 14);
}

// Returns the CENTRE pixel of grid cell (gx, gz) given current camera offset.
// camZ is the z of the row shown at the bottom of the screen.
function gridToScreen(gx, gz) {
  const sz = getGridSize();
  // horizontal: centre grid in canvas
  const totalW = GRID_COLS * sz;
  const originX = (W() - totalW) / 2;
  // vertical: row 0 (start zone) near bottom; higher z = higher on screen
  const baseY = H() - sz * 1.5;           // y of row camZ
  const x = originX + (gx + 0.5) * sz;    // cell centre
  const y = baseY - (gz - camZ) * sz;     // camera-relative
  return { x, y, sz };
}

// ── lane generation ───────────────────────────────────────────────────────────
const CAR_COLORS = ['#ff3344','#ff8800','#ff00ff','#00f5ff','#ffff00'];

function generateLane(z) {
  if (z <= 0) return { type: 'safe',  z, objects: [], speed: 0 };
  if (z === 1) return { type: 'grass', z, objects: [], speed: 0 };
  if (z % 8 === 0) return { type: 'safe', z, objects: [], speed: 0 };

  const diff = Math.min(z / 40, 1);
  const roll = Math.random();
  let type;
  if (z < 5)      type = roll < 0.5 ? 'road' : 'grass';
  else             type = roll < 0.45 ? 'road' : roll < 0.75 ? 'water' : 'grass';

  const lane = { type, z, objects: [], speed: 0 };

  if (type === 'road') {
    lane.speed = (Math.random()>0.5?1:-1) * (1.5 + diff*3 + Math.random());
    const count = 2 + Math.floor(diff * 3);
    for (let i = 0; i < count; i++) {
      const isTruck = Math.random() < 0.25 + diff*0.15;
      const w = (isTruck ? 2.0 : 1.2) + Math.random()*0.4;
      lane.objects.push({
        x: (i / count) * GRID_COLS + Math.random()*1.5,
        width: w,
        color: CAR_COLORS[Math.floor(Math.random()*CAR_COLORS.length)],
        isTruck
      });
    }
  }

  if (type === 'water') {
    lane.speed = (Math.random()>0.5?1:-1) * (0.8 + diff*1.5 + Math.random()*0.5);
    const count = 2 + Math.floor(Math.random()*2);
    for (let i = 0; i < count; i++) {
      lane.objects.push({
        x: (i / count) * GRID_COLS + Math.random()*1.5,
        width: 2.0 + Math.random()*2,
        isTurtle: Math.random() < 0.25
      });
    }
  }

  return lane;
}

// ── particles ─────────────────────────────────────────────────────────────────
let particles = [];
function spawnParticles(x, y, color, count, type='burst') {
  for (let i=0;i<count;i++) {
    const angle = (i/count)*Math.PI*2 + Math.random()*0.5;
    const spd = type==='splash' ? 1+Math.random()*3 : 0.5+Math.random()*4;
    particles.push({
      x, y,
      vx: Math.cos(angle)*spd,
      vy: Math.sin(angle)*spd - (type==='jump'?3:0),
      alpha:1, size:2+Math.random()*4, color, life:1,
      decay: 0.04+Math.random()*0.04,
      gravity: type==='burst'?0.15:0.05
    });
  }
}
function updateParticles() {
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += p.gravity;
    p.life -= p.decay; p.alpha = Math.max(0, p.life);
  });
  particles = particles.filter(p => p.life > 0);
}
function drawParticles() {
  particles.forEach(p => {
    if (p.life<=0||p.size<=0) return;
    const r = p.size * p.life; if (r<=0) return;
    ctx.globalAlpha = Math.max(0,Math.min(1,p.alpha));
    ctx.fillStyle = p.color; ctx.shadowColor = p.color; ctx.shadowBlur = 6;
    ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1; ctx.shadowBlur=0;
}

// ── lane drawing ──────────────────────────────────────────────────────────────
function drawLane(lane, time) {
  const { y, sz } = gridToScreen(0, lane.z);
  // y is CENTRE of row; top edge is y - sz/2
  const top = y - sz/2;
  const w = W();

  if (lane.type === 'safe' || lane.type === 'grass') {
    ctx.fillStyle = lane.type==='safe' ? '#0d2a0d' : '#0a1a0a';
    ctx.fillRect(0, top, w, sz);
    if (lane.type==='safe') {
      ctx.fillStyle = 'rgba(57,255,20,0.08)';
      for (let i=0;i<5;i++) {
        ctx.beginPath();
        ctx.arc(w*(i+0.5)/5, top+sz/2, sz*0.35, 0, Math.PI*2);
        ctx.fill();
      }
    }
    ctx.strokeStyle = lane.type==='safe' ? 'rgba(57,255,20,0.4)' : 'rgba(57,255,20,0.15)';
    ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(0, top+sz); ctx.lineTo(w, top+sz); ctx.stroke();
    return;
  }

  if (lane.type === 'road') {
    ctx.fillStyle = '#181818';
    ctx.fillRect(0, top, w, sz);
    ctx.setLineDash([sz*0.4, sz*0.3]);
    ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(0, top+sz/2); ctx.lineTo(w, top+sz/2); ctx.stroke();
    ctx.setLineDash([]);
    ctx.strokeStyle='rgba(255,51,68,0.25)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(0,top); ctx.lineTo(w,top); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,top+sz); ctx.lineTo(w,top+sz); ctx.stroke();

    lane.objects.forEach(car => {
      // car.x is grid-coordinate of left edge
      const { x: cx0, sz: csz } = gridToScreen(car.x, lane.z);
      const cw = car.width * csz * 0.88;
      const ch = (car.isTruck ? 0.72 : 0.6) * csz;
      const cx = cx0 - csz*0.44;          // left edge in pixels (gridToScreen gives centre of car.x column)
      const cy = top + (sz - ch) / 2;     // vertically centred in lane

      ctx.shadowColor = car.color; ctx.shadowBlur = 12;
      ctx.fillStyle = car.color;
      ctx.beginPath(); ctx.roundRect(cx, cy, cw, ch, 3); ctx.fill();
      ctx.shadowBlur = 0;

      // window
      ctx.fillStyle='rgba(0,0,0,0.5)';
      const ws = lane.speed>0 ? 0.55 : 0.1;
      ctx.fillRect(cx+cw*ws, cy+ch*0.1, cw*0.3, ch*0.35);

      // headlights
      ctx.shadowColor='#ffff88'; ctx.shadowBlur=8; ctx.fillStyle='#ffff88';
      const hlSide = lane.speed>0 ? cx+cw-cw*0.1 : cx;
      ctx.fillRect(hlSide, cy+ch*0.15, cw*0.08, ch*0.2);
      ctx.fillRect(hlSide, cy+ch*0.6,  cw*0.08, ch*0.2);
      ctx.shadowBlur=0;

      // wheels
      ctx.fillStyle='#111';
      ctx.fillRect(cx+cw*0.1, cy+ch-3, cw*0.25, 4);
      ctx.fillRect(cx+cw*0.65, cy+ch-3, cw*0.25, 4);
    });
  }

  if (lane.type === 'water') {
    const grad = ctx.createLinearGradient(0,top,0,top+sz);
    grad.addColorStop(0,'#041a2f'); grad.addColorStop(0.5,'#062840'); grad.addColorStop(1,'#041a2f');
    ctx.fillStyle = grad; ctx.fillRect(0, top, w, sz);

    // wave shimmer
    const wOff = (time*0.04*Math.abs(lane.speed||1)) % (w*0.5);
    ctx.strokeStyle='rgba(0,245,255,0.06)'; ctx.lineWidth=2;
    for (let i=-1;i<4;i++) {
      const wx0 = (i*w*0.5 + wOff) % w;
      ctx.beginPath();
      for (let t2=0;t2<=1;t2+=0.05) {
        const wx2 = wx0 + t2*w*0.5;
        const wy  = top + sz/2 + Math.sin(t2*Math.PI*4)*sz*0.1;
        t2===0 ? ctx.moveTo(wx2,wy) : ctx.lineTo(wx2,wy);
      }
      ctx.stroke();
    }
    ctx.strokeStyle='rgba(0,245,255,0.2)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(0,top); ctx.lineTo(w,top); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,top+sz); ctx.lineTo(w,top+sz); ctx.stroke();

    lane.objects.forEach(obj => {
      const { x: ox0, sz: osz } = gridToScreen(obj.x, lane.z);
      const ow = obj.width * osz * 0.88;
      const oh = osz * 0.5;
      const ox = ox0 - osz*0.44;
      const oy = top + (sz - oh) / 2;

      if (!obj.isTurtle) {
        const lg = ctx.createLinearGradient(ox,oy,ox,oy+oh);
        lg.addColorStop(0,'#6b3a1f'); lg.addColorStop(0.4,'#8B4513'); lg.addColorStop(1,'#5a2e0f');
        ctx.shadowColor='#8B4513'; ctx.shadowBlur=6;
        ctx.fillStyle=lg;
        ctx.beginPath(); ctx.roundRect(ox,oy,ow,oh,oh/2); ctx.fill();
        ctx.shadowBlur=0;
        ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=1;
        for (let i=1;i<4;i++) {
          ctx.beginPath(); ctx.moveTo(ox+ow*i/4, oy+2); ctx.lineTo(ox+ow*i/4, oy+oh-2); ctx.stroke();
        }
      } else {
        const tCount = Math.max(2, Math.floor(obj.width));
        const tw = ow/tCount;
        for (let ti=0;ti<tCount;ti++) {
          const tx = ox + ti*tw + tw/2;
          const ty = oy + oh/2;
          ctx.shadowColor='#2a8a2a'; ctx.shadowBlur=5;
          ctx.fillStyle='#1a5a1a';
          ctx.beginPath(); ctx.ellipse(tx,ty,tw*0.42,oh*0.45,0,0,Math.PI*2); ctx.fill();
          ctx.strokeStyle='#39ff14'; ctx.lineWidth=0.5; ctx.globalAlpha=0.4;
          ctx.beginPath(); ctx.arc(tx,ty,tw*0.25,0,Math.PI*2); ctx.stroke();
          ctx.globalAlpha=1; ctx.shadowBlur=0;
          ctx.fillStyle='#fff';
          ctx.beginPath(); ctx.arc(tx-tw*0.12,ty-oh*0.15,2,0,Math.PI*2);
          ctx.arc(tx+tw*0.12,ty-oh*0.15,2,0,Math.PI*2); ctx.fill();
          ctx.fillStyle='#000';
          ctx.beginPath(); ctx.arc(tx-tw*0.12,ty-oh*0.15,1,0,Math.PI*2);
          ctx.arc(tx+tw*0.12,ty-oh*0.15,1,0,Math.PI*2); ctx.fill();
        }
      }
    });
  }
}

// ── frog drawing ──────────────────────────────────────────────────────────────
function drawFrog(px, py, sz, jumpT, invincible) {
  if (invincible && Math.floor(Date.now()/80)%2===0) return;

  const s = sz * 0.42;
  const bounce = Math.sin(jumpT * Math.PI) * s * 0.9;
  const sqX = jumpT>0 ? (1 - Math.sin(jumpT*Math.PI)*0.2) : 1;
  const sqY = jumpT>0 ? (1 + Math.sin(jumpT*Math.PI)*0.3) : 1;

  ctx.save();
  ctx.translate(px, py - bounce);

  // shadow
  ctx.globalAlpha = Math.max(0, 0.3 - bounce/(s*5));
  ctx.fillStyle='#000';
  ctx.beginPath(); ctx.ellipse(0, bounce+s*0.15, s*sqX*0.9, s*0.25, 0, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;

  // back legs
  const legB = Math.sin(jumpT*Math.PI)*s*0.4;
  ctx.fillStyle='#1a5a00';
  ctx.beginPath();
  ctx.ellipse(-s*0.7*sqX, s*0.2-legB*0.3, s*0.35, s*0.2, -0.4, 0, Math.PI*2);
  ctx.ellipse( s*0.7*sqX, s*0.2-legB*0.3, s*0.35, s*0.2,  0.4, 0, Math.PI*2);
  ctx.fill();

  // body
  const bg = ctx.createRadialGradient(-s*0.2,-s*0.3,0, 0,0,s);
  bg.addColorStop(0,'#7aff3a'); bg.addColorStop(0.5,'#39ff14'); bg.addColorStop(1,'#1a6a00');
  ctx.fillStyle=bg; ctx.shadowColor='#39ff14'; ctx.shadowBlur=14;
  ctx.beginPath(); ctx.ellipse(0,0,s*0.85*sqX,s*0.65*sqY,0,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;

  // belly
  ctx.fillStyle='rgba(180,255,120,0.3)';
  ctx.beginPath(); ctx.ellipse(0,s*0.1,s*0.45,s*0.3,0,0,Math.PI*2); ctx.fill();

  // eyes
  const eo = s*0.35*sqX, ey = -s*0.55*sqY;
  for (const ex of [-eo, eo]) {
    ctx.fillStyle='#0a2a00';
    ctx.beginPath(); ctx.ellipse(ex, ey-s*0.1, s*0.22, s*0.18, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='#eeffee'; ctx.shadowColor='#fff'; ctx.shadowBlur=4;
    ctx.beginPath(); ctx.arc(ex, ey, s*0.17, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='#111';
    ctx.beginPath(); ctx.arc(ex, ey-s*0.04, s*0.08, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.7)';
    ctx.beginPath(); ctx.arc(ex-s*0.04, ey-s*0.06, s*0.04, 0, Math.PI*2); ctx.fill();
  }

  // mouth
  ctx.strokeStyle='#0a2a00'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(0,s*0.05,s*0.3,0.3,Math.PI-0.3); ctx.stroke();

  ctx.restore();
}

// ── game state ────────────────────────────────────────────────────────────────
let gameState;
let camZ = 0;           // smoothed camera (= z of bottom-visible row)
let lastTime = 0;
let rafId = null;

function init() {
  camZ = 0;
  particles = [];
  const best = getHighScore('crossyfrog');

  gameState = {
    frog: { x: 5, z: 0 },   // INTEGER grid coords
    targetX: 5, targetZ: 0,  // where frog is hopping TO (same as frog after snap)
    maxZ: 0,
    lanes: {},
    state: 'title',
    best,
    lives: LIVES_MAX,
    score: 0,
    combo: 0,
    lastHop: 0,
    invincibleUntil: 0,
    // jump animation
    anim: { active:false, fromX:5, fromZ:0, toX:5, toZ:0, t:0, dur:160, startMs:0 },
  };

  for (let z=-1; z<25; z++) gameState.lanes[z] = generateLane(z);

  ui.score.textContent = 0;
  ui.best.textContent  = best;
  ui.bestScore.textContent = 'BEST: ' + best;
  updateLivesUI(LIVES_MAX);
  ui.startOverlay.classList.remove('hidden');
  ui.gameoverOverlay.classList.add('hidden');
  ui.comboDisplay.style.opacity='0';
}

// ── score popup ───────────────────────────────────────────────────────────────
function spawnScorePopup(text, x, y, color) {
  const el = document.createElement('div');
  el.className='score-popup';
  el.textContent=text;
  el.style.cssText=`left:${x}px;top:${y}px;font-size:16px;color:${color};text-shadow:0 0 8px ${color};`;
  container.appendChild(el);
  setTimeout(()=>el.remove(), 1000);
}
function updateComboUI() {
  const c=gameState.combo;
  if (c>=3) {
    ui.comboDisplay.textContent=`✕${c} COMBO!`;
    ui.comboDisplay.style.opacity='1';
    ui.comboDisplay.style.fontSize=Math.min(13+c*1.5,26)+'px';
  } else ui.comboDisplay.style.opacity='0';
}

// ── COLLISION ─────────────────────────────────────────────────────────────────
// All collision uses INTEGER frog.x, frog.z (position after hop).
// Objects have .x (grid left edge, float) and .width (grid units).
// Wrap range is 0..(GRID_COLS + some buffer); wrap at ~GRID_COLS+4.
const WRAP = GRID_COLS + 4;

function normaliseX(x) {
  // bring x into canonical [0, GRID_COLS) range accounting for wrapping
  return ((x % WRAP) + WRAP) % WRAP;
}

function frogOnObject(frogX, obj) {
  // frogX is the integer centre column (0-10).
  // obj.x is its left edge; obj.width in columns.
  // Account for wrap-around.
  const margin = 0.3;
  const left  = obj.x + margin;
  const right = obj.x + obj.width - margin;
  // check direct and wrapped
  const fx = frogX;
  if (fx >= left && fx <= right) return true;
  if (fx + WRAP >= left && fx + WRAP <= right) return true;
  if (fx - WRAP >= left && fx - WRAP <= right) return true;
  return false;
}

function checkCollision() {
  if (gameState.state !== 'playing') return;
  if (Date.now() < gameState.invincibleUntil) return;

  const f = gameState.frog;
  const lane = gameState.lanes[f.z];
  if (!lane) return;

  if (lane.type === 'road') {
    for (const car of lane.objects) {
      if (frogOnObject(f.x, car)) {
        triggerDeath('road', car.color);
        return;
      }
    }
  }

  if (lane.type === 'water') {
    let safe = false;
    for (const obj of lane.objects) {
      if (frogOnObject(f.x, obj)) { safe = true; break; }
    }
    if (!safe) triggerDeath('water', '#00f5ff');
  }
}

// ── death / lives ─────────────────────────────────────────────────────────────
function triggerDeath(cause, color) {
  if (gameState.state !== 'playing') return;
  gameState.state = 'dying';
  gameState.combo = 0; updateComboUI();

  const p = gridToScreen(gameState.frog.x, gameState.frog.z);
  if (cause==='road') {
    spawnParticles(p.x,p.y,color,20,'burst');
    spawnParticles(p.x,p.y,'#39ff14',12,'burst');
  } else {
    spawnParticles(p.x,p.y,'#00f5ff',20,'splash');
    spawnParticles(p.x,p.y,'#fff',8,'splash');
  }

  gameState.lives--;
  updateLivesUI(gameState.lives);

  setTimeout(()=>{
    if (gameState.lives > 0) {
      gameState.frog.x = 5;
      gameState.frog.z = Math.max(0, gameState.maxZ);
      gameState.anim.active = false;
      gameState.invincibleUntil = Date.now() + 2000;
      gameState.state = 'playing';
    } else {
      endGame(cause);
    }
  }, 700);
}

function endGame(cause) {
  gameState.state = 'dead';
  const isNew = gameState.maxZ > gameState.best;
  if (isNew) { gameState.best = gameState.maxZ; setHighScore('crossyfrog', gameState.best); }

  ui.finalScore.textContent = gameState.maxZ;
  ui.bestScore.textContent  = (isNew?'🏆 NEW BEST: ':'BEST: ') + gameState.best;
  ui.best.textContent       = gameState.best;

  const titles = {road:['SPLAT!','ROAD PIZZA 🍕','SQUISHED!'], water:['BLUB BLUB...','POND DIVE','DROWNED!']};
  const msgs   = {road:'FROG GOT HIT BY A CAR', water:'FROG FELL IN THE WATER'};
  const pool   = titles[cause] || ['GAME OVER'];
  ui.deathTitle.textContent = pool[Math.floor(Math.random()*pool.length)];
  ui.deathTitle.style.color = cause==='road' ? '#ff3344' : '#00f5ff';
  ui.deathMsg.textContent   = msgs[cause] || 'FROG MET THEIR END';
  ui.gameoverOverlay.classList.remove('hidden');
}

// ── HOP ───────────────────────────────────────────────────────────────────────
function hop(dx, dz) {
  if (gameState.state !== 'playing') return;
  if (performance.now() - gameState.lastHop < 160) return;
  gameState.lastHop = performance.now();

  const f = gameState.frog;
  const newX = f.x + dx;
  const newZ = f.z + dz;

  if (newX < 0 || newX >= GRID_COLS) return;
  if (newZ < 0) return;

  // start jump animation
  gameState.anim = { active:true, fromX:f.x, fromZ:f.z, toX:newX, toZ:newZ, t:0, dur:160, startMs:performance.now() };

  // snap frog immediately to destination (animation is purely visual)
  f.x = newX;
  f.z = newZ;

  const pp = gridToScreen(f.x, f.z);
  spawnParticles(pp.x, pp.y, '#39ff14', 5, 'jump');

  if (dz > 0) {
    const prevMax = gameState.maxZ;
    gameState.maxZ = Math.max(gameState.maxZ, f.z);
    if (f.z > prevMax) {
      gameState.combo++;
      updateComboUI();
      const pts = gameState.combo>=5 ? 5 : gameState.combo>=3 ? 2 : 1;
      gameState.score += pts;
      ui.score.textContent = gameState.maxZ;
      const color = pts>=5?'#ffff00':pts>=2?'#ff00ff':'#39ff14';
      const text  = pts>=5?`+${pts} 🔥`:pts>=2?`+${pts} COMBO`:'+1';
      spawnScorePopup(text, pp.x-20, pp.y-30, color);
    }
  } else {
    gameState.combo=0; updateComboUI();
  }

  // generate ahead
  if (!gameState.lanes[f.z + 15]) {
    for (let i=0;i<8;i++) {
      const nz = f.z+10+i;
      if (!gameState.lanes[nz]) gameState.lanes[nz]=generateLane(nz);
    }
  }
  // cull far behind
  for (const z in gameState.lanes) {
    if (Number(z) < f.z-30) delete gameState.lanes[z];
  }
}

// ── UPDATE ────────────────────────────────────────────────────────────────────
function update(dt) {
  if (gameState.state!=='playing' && gameState.state!=='dying') return;

  // smooth camera: keep frog ~4 rows above bottom
  const targetCam = Math.max(0, gameState.frog.z - 4);
  camZ += (targetCam - camZ) * 0.1;

  // move lane objects
  Object.values(gameState.lanes).forEach(lane => {
    if (!lane.speed) return;
    lane.objects.forEach(o => {
      o.x += lane.speed * dt;
      // wrap within [−2, GRID_COLS+2]
      if (o.x > GRID_COLS + 2) o.x -= WRAP;
      if (o.x < -2)            o.x += WRAP;
    });
  });

  // drift frog on water (carried by log/turtle)
  if (gameState.state==='playing') {
    const f = gameState.frog;
    const fLane = gameState.lanes[f.z];
    if (fLane && fLane.type==='water') {
      for (const obj of fLane.objects) {
        if (frogOnObject(f.x, obj)) {
          // drift frog's visual float position (non-integer)
          // We track a sub-pixel offset separately so integer stays stable
          if (!gameState.waterOffset) gameState.waterOffset = 0;
          gameState.waterOffset += fLane.speed * dt;
          // once offset accumulates ≥1, shift integer position
          if (gameState.waterOffset >= 0.5) {
            f.x = Math.min(GRID_COLS-1, f.x+1);
            gameState.waterOffset -= 1;
          } else if (gameState.waterOffset <= -0.5) {
            f.x = Math.max(0, f.x-1);
            gameState.waterOffset += 1;
          }
          break;
        }
      }
    } else {
      gameState.waterOffset = 0;
    }
  }

  updateParticles();
  if (gameState.state==='playing') checkCollision();
}

// ── DRAW ──────────────────────────────────────────────────────────────────────
function draw(time) {
  ctx.fillStyle='#050510';
  ctx.fillRect(0,0,W(),H());

  drawStars(time);
  drawMoon(time);

  // draw lanes (back to front = increasing z)
  const laneKeys = Object.keys(gameState.lanes).map(Number).sort((a,b)=>a-b);
  laneKeys.forEach(z => {
    const { y, sz } = gridToScreen(0, z);
    const top = y - sz/2;
    if (top < H() + sz && top > -sz*2) {
      drawLane(gameState.lanes[z], time);
    }
  });

  // frog position: interpolate during animation
  const f = gameState.frog;
  let renderX = f.x, renderZ = f.z;
  let jumpT = 0;

  if (gameState.anim.active) {
    const elapsed = performance.now() - gameState.anim.startMs;
    const prog = Math.min(elapsed / gameState.anim.dur, 1);
    jumpT = prog < 1 ? prog : 0;
    renderX = gameState.anim.fromX + (gameState.anim.toX - gameState.anim.fromX) * prog;
    renderZ = gameState.anim.fromZ + (gameState.anim.toZ - gameState.anim.fromZ) * prog;
    if (prog >= 1) gameState.anim.active = false;
  }

  const fp = gridToScreen(renderX, renderZ);
  const invincible = Date.now() < gameState.invincibleUntil;
  drawFrog(fp.x, fp.y, fp.sz, jumpT, invincible);

  drawParticles();

  // invincibility shield
  if (invincible) {
    const rem = (gameState.invincibleUntil - Date.now())/2000;
    ctx.globalAlpha = rem*0.3;
    ctx.strokeStyle='#39ff14'; ctx.lineWidth=2;
    ctx.shadowColor='#39ff14'; ctx.shadowBlur=12;
    ctx.beginPath(); ctx.arc(fp.x, fp.y, fp.sz*0.6, 0, Math.PI*2); ctx.stroke();
    ctx.globalAlpha=1; ctx.shadowBlur=0;
  }
}

// ── GAME LOOP ─────────────────────────────────────────────────────────────────
function gameLoop(ts) {
  rafId = requestAnimationFrame(gameLoop);
  const dt = lastTime ? Math.min((ts-lastTime)/1000, 0.05) : 0;
  lastTime = ts;
  update(dt);
  draw(ts);
}

// ── INPUT ─────────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (gameState.state !== 'playing') return;
  if (['ArrowUp','KeyW'].includes(e.code))    { hop(0,1);  e.preventDefault(); }
  else if (['ArrowDown','KeyS'].includes(e.code))  { hop(0,-1); e.preventDefault(); }
  else if (['ArrowLeft','KeyA'].includes(e.code))  { hop(-1,0); e.preventDefault(); }
  else if (['ArrowRight','KeyD'].includes(e.code)) { hop(1,0);  e.preventDefault(); }
});

let touchStart = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touchStart = { x:e.touches[0].clientX, y:e.touches[0].clientY };
}, { passive:false });
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  touchStart = null;
  const dist = Math.sqrt(dx*dx+dy*dy);
  if (dist<15) { hop(0,1); return; }
  if (Math.abs(dx)>Math.abs(dy)) hop(dx>0?1:-1, 0);
  else hop(0, dy<0?1:-1);
}, { passive:false });

document.getElementById('startBtn').onclick   = () => { gameState.state='playing'; ui.startOverlay.classList.add('hidden'); lastTime=0; };
document.getElementById('restartBtn').onclick = () => { ui.gameoverOverlay.classList.add('hidden'); init(); gameState.state='playing'; lastTime=0; };

// ── BOOT ──────────────────────────────────────────────────────────────────────
resizeCanvas();
init();
lastTime = 0;
rafId = requestAnimationFrame(gameLoop);
</script>

</body>
