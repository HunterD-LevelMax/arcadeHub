<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>CROSSY FROG — ARCADE HUB</title>
  <link rel="stylesheet" href="../style/game.css">
  <link rel="stylesheet" href="../style/frogger.css">
</head>
<body>

  <div class="page">
    <div class="header">
      <a href="../index.html" class="back-btn">← BACK</a>
      <div class="game-title">CROSSY FROG</div>
      <div class="frogger-hud">
        <div class="score-display">SCORE: <span id="scoreVal">0</span></div>
        <div class="score-display score-best">BEST: <span id="bestVal">0</span></div>
        <div class="score-display score-lives">
          LIVES:
          <span class="lives-display" id="livesDisplay">
            <span class="life-icon" id="life0">🐸</span>
            <span class="life-icon" id="life1">🐸</span>
            <span class="life-icon" id="life2">🐸</span>
          </span>
        </div>
      </div>
    </div>

    <div class="game-container" id="gameContainer">
      <canvas id="c"></canvas>
      <div id="comboDisplay"></div>

      <div class="overlay" id="startOverlay">
        <div class="overlay-title" style="color: var(--neon-green); text-shadow: 0 0 30px var(--neon-green);">CROSSY FROG</div>
        <div class="overlay-sub">HOP ACROSS ROADS AND RIVERS · COLLECT COINS</div>
        <button class="start-btn" id="startBtn">PLAY</button>
        <div class="controls-hint">
          <div class="key-hint"><div class="key-icon">↑</div><div>HOP</div></div>
          <div class="key-hint"><div class="key-icon">←→</div><div>SIDE</div></div>
          <div class="key-hint"><div class="key-icon">↓</div><div>BACK</div></div>
        </div>
      </div>

      <div class="overlay hidden" id="gameoverOverlay">
        <div class="overlay-title" id="deathTitle" style="color: #ff3344;">GAME OVER</div>
        <div class="overlay-sub" id="deathMsg">FROG GOT HIT</div>
        <div class="overlay-score" id="finalScore">0</div>
        <div class="overlay-best" id="bestScore">BEST: 0</div>
        <div class="overlay-coins hidden" id="coinRewardBlock">
          <div class="overlay-coins-earned" id="coinRewardEarned">+0 COINS</div>
          <div class="overlay-coins-total" id="coinRewardTotal">TOTAL: 0</div>
        </div>
        <div class="overlay-coins-hint hidden" id="coinRewardHint"></div>
        <button class="start-btn" id="restartBtn">RETRY</button>
      </div>
    </div>

    <div class="footer">ARROWS / WASD · SWIPE ON MOBILE</div>
  </div>

<script src="../js/haptics.js"></script>
<script src="../js/game.js"></script>
<script src="../js/economy-api.js"></script>
<script src="../js/frogger/constants.js"></script>
<script src="../js/frogger/world.js"></script>
<script src="../js/frogger/physics.js"></script>
<script src="../js/frogger/entities.js"></script>
<script src="../js/frogger/render.js"></script>
<script src="../js/frogger/game.js"></script>
<script>
const game = new CrossyFrogGame({
  canvas: document.getElementById('c'),
  container: document.getElementById('gameContainer'),
  ui: {
    score: document.getElementById('scoreVal'),
    best: document.getElementById('bestVal'),
    finalScore: document.getElementById('finalScore'),
    bestScore: document.getElementById('bestScore'),
    startOverlay: document.getElementById('startOverlay'),
    gameoverOverlay: document.getElementById('gameoverOverlay'),
    comboDisplay: document.getElementById('comboDisplay'),
    deathTitle: document.getElementById('deathTitle'),
    deathMsg: document.getElementById('deathMsg')
  }
});
game.boot();
</script>

</body>
</html>
