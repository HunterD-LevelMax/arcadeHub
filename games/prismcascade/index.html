const CLEAR_ANIM_MS = 200;

const SELECT_PULSE_MS = 200;
const PRESS_PULSE_MS = 120;
const SHAKE_MS = 150;

function easeOutCubic(t) {
  return 1 - Math.pow(1 - t, 3);
}

function easeOutBack(t) {
  const c = 1.70158;
  return 1 + (c + 1) * Math.pow(t - 1, 3) + c * Math.pow(t - 1, 2);
}

function computeGridMetrics() {
  const pad = 11;
  const size = Math.min(W() - pad * 2, H() - pad * 2);
  const cellSize = size / GRID_SIZE;
  return {
    cellSize,
    offsetX: (W() - size) / 2,
    offsetY: (H() - size) / 2,
    size,
  };
}

function getDragThreshold() {
  return gridMetrics ? gridMetrics.cellSize * 0.28 : 15;
}

function isAdjacent(a, b) {
  return Math.abs(a.r - b.r) + Math.abs(a.c - b.c) === 1;
}

function getSelectionScale(now) {
  if (!selectedAt) return 1;
  const elapsed = now - selectedAt;
  if (elapsed > SELECT_PULSE_MS) return 1;
  const pulseT = Math.min(1, elapsed / 120);
  return 1 + 0.15 * (1 - elapsed / SELECT_PULSE_MS) * easeOutBack(pulseT);
}

function getPressScale(now) {
  if (!pressedAt) return 1;
  const elapsed = now - pressedAt;
  if (elapsed > PRESS_PULSE_MS) return 1;
  return 1 + 0.12 * easeOutBack(elapsed / PRESS_PULSE_MS);
}

function cellCenter(r, c) {
  const m = gridMetrics;
  return {
    x: m.offsetX + c * m.cellSize + m.cellSize / 2,
    y: m.offsetY + r * m.cellSize + m.cellSize / 2,
    size: m.cellSize * GEM_SIZE_RATIO,
  };
}

function getCellFromPointer(e) {
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (canvas.width / rect.width);
  const y = (e.clientY - rect.top) * (canvas.height / rect.height);
  const m = gridMetrics;
  const c = Math.floor((x - m.offsetX) / m.cellSize);
  const r = Math.floor((y - m.offsetY) / m.cellSize);
  if (r < 0 || r >= GRID_SIZE || c < 0 || c >= GRID_SIZE) return null;
  return { r, c };
}

function randomGemType() {
  return Math.floor(Math.random() * GEM_TYPES);
}

function randomGemAvoidingMatch(board, r, c) {
  const forbidden = new Set();
  if (c >= 2 && board[r][c - 1] >= 0 && board[r][c - 1] === board[r][c - 2]) {
    forbidden.add(board[r][c - 1]);
  }
  if (r >= 2 && board[r - 1][c] >= 0 && board[r - 1][c] === board[r - 2][c]) {
    forbidden.add(board[r - 1][c]);
  }
  let type;
  let guard = 0;
  do {
    type = randomGemType();
    guard++;
  } while (forbidden.has(type) && guard < 20);
  return type;
}

function createEmptyBoard() {
  return Array.from({ length: GRID_SIZE }, () => Array(GRID_SIZE).fill(0));
}

function createEmptySpecialGrid() {
  return Array.from({ length: GRID_SIZE }, () => Array(GRID_SIZE).fill(null));
}

function createEmptyBlockGrid() {
  return Array.from({ length: GRID_SIZE }, () => Array(GRID_SIZE).fill(null));
}

function isSolidCell(r, c) {
  return grid[r][c] >= 0 || (blockGrid[r][c] && blockGrid[r][c].type === 'crate');
}

function isMovable(r, c) {
  return grid[r][c] >= 0 && !(blockGrid[r][c] && blockGrid[r][c].type === 'ice');
}

function cellKey(r, c) {
  return `${r},${c}`;
}

function swapCellsBoth(r1, c1, r2, c2) {
  swapCells(grid, r1, c1, r2, c2);
  const tmpS = specialGrid[r1][c1];
  specialGrid[r1][c1] = specialGrid[r2][c2];
  specialGrid[r2][c2] = tmpS;
  const tmpB = blockGrid[r1][c1];
  blockGrid[r1][c1] = blockGrid[r2][c2];
  blockGrid[r2][c2] = tmpB;
}

function addToClearSet(clearSet, r, c) {
  if (r >= 0 && r < GRID_SIZE && c >= 0 && c < GRID_SIZE && grid[r][c] >= 0) {
    clearSet.add(cellKey(r, c));
  }
}

function addRadius(clearSet, r, c, radius) {
  for (let dr = -radius; dr <= radius; dr++) {
    for (let dc = -radius; dc <= radius; dc++) {
      addToClearSet(clearSet, r + dr, c + dc);
    }
  }
}

function addRow(clearSet, r) {
  for (let c = 0; c < GRID_SIZE; c++) addToClearSet(clearSet, r, c);
}

function addCol(clearSet, c) {
  for (let r = 0; r < GRID_SIZE; r++) addToClearSet(clearSet, r, c);
}

function addColor(clearSet, color) {
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      if (grid[r][c] === color) addToClearSet(clearSet, r, c);
    }
  }
}

function triggerShake(intensity) {
  screenShake = Math.max(screenShake, intensity);
  ui.gameContainer.classList.remove('board-shake');
  void ui.gameContainer.offsetWidth;
  ui.gameContainer.classList.add('board-shake');
}

function applySingleExplosion(clearSet, r, c, special, partnerColor) {
  switch (special) {
    case SPECIAL.NOVA:
      addRadius(clearSet, r, c, BONUS_CONFIG.novaRadius);
      break;
    case SPECIAL.BEAM_H:
      addRow(clearSet, r);
      break;
    case SPECIAL.BEAM_V:
      addCol(clearSet, c);
      break;
    case SPECIAL.PRISM:
      addColor(clearSet, partnerColor != null ? partnerColor : grid[r][c]);
      break;
    case SPECIAL.CROSS:
      addRow(clearSet, r);
      addCol(clearSet, c);
      break;
    case SPECIAL.CHRONO:
      addToClearSet(clearSet, r, c);
      addTime(BONUS_CONFIG.chronoTimeBonus);
      break;
    default:
      addToClearSet(clearSet, r, c);
  }
}

function applySpecialCombo(clearSet, r1, c1, s1, r2, c2, s2) {
  if (s1 === SPECIAL.CHRONO || s2 === SPECIAL.CHRONO) {
    const other = s1 === SPECIAL.CHRONO ? s2 : s1;
    const or1 = s1 === SPECIAL.CHRONO ? r2 : r1;
    const oc1 = s1 === SPECIAL.CHRONO ? c2 : c1;
    const or2 = s1 === SPECIAL.CHRONO ? r1 : r2;
    const oc2 = s1 === SPECIAL.CHRONO ? c1 : c2;
    applySingleExplosion(clearSet, or1, oc1, other);
    applySingleExplosion(clearSet, or2, oc2, other);
    addTime(BONUS_CONFIG.chronoTimeBonus * 2);
    addFloatText(W() / 2, H() * 0.32, 'CHRONO BLAST!', '#39ff14');
    triggerShake(1.2);
    return [s1, s2];
  }
  if (s1 === SPECIAL.PRISM && s2 === SPECIAL.PRISM) {
    for (let r = 0; r < GRID_SIZE; r++) {
      for (let c = 0; c < GRID_SIZE; c++) {
        if (grid[r][c] >= 0 && !specialGrid[r][c]) addToClearSet(clearSet, r, c);
      }
    }
    addFloatText(W() / 2, H() * 0.32, 'PRISM SURGE!', '#ffffff');
    triggerShake(1.5);
    return [s1, s2];
  }
  if (s1 === SPECIAL.NOVA && s2 === SPECIAL.NOVA) {
    const mr = Math.round((r1 + r2) / 2);
    const mc = Math.round((c1 + c2) / 2);
    addRadius(clearSet, mr, mc, BONUS_CONFIG.megaNovaRadius);
    addFloatText(W() / 2, H() * 0.32, 'MEGA NOVA!', '#ff4466');
    triggerShake(1.3);
    return [s1, s2];
  }
  if ((s1 === SPECIAL.BEAM_H || s1 === SPECIAL.BEAM_V) && (s2 === SPECIAL.BEAM_H || s2 === SPECIAL.BEAM_V)) {
    addRow(clearSet, r1);
    addRow(clearSet, r2);
    addCol(clearSet, c1);
    addCol(clearSet, c2);
    addFloatText(W() / 2, H() * 0.32, 'CROSS BEAM!', '#00f5ff');
    triggerShake(1.1);
    return [s1, s2];
  }
  if (s1 === SPECIAL.PRISM || s2 === SPECIAL.PRISM) {
    const pr = s1 === SPECIAL.PRISM ? r1 : r2;
    const pc = s1 === SPECIAL.PRISM ? c1 : c2;
    const color = grid[pr][pc];
    addColor(clearSet, color);
    const or = s1 === SPECIAL.PRISM ? r2 : r1;
    const oc = s1 === SPECIAL.PRISM ? c2 : c1;
    const other = s1 === SPECIAL.PRISM ? s2 : s1;
    applySingleExplosion(clearSet, or, oc, other);
    addFloatText(W() / 2, H() * 0.32, 'PRISM COMBO!', '#ffffff');
    triggerShake(1.2);
    return [s1, s2];
  }
  applySingleExplosion(clearSet, r1, c1, s1);
  applySingleExplosion(clearSet, r2, c2, s2);
  triggerShake(0.8);
  return [s1, s2];
}

function processSpecialExplosions(clearSet, comboPair) {
  const activations = [];
  const processed = new Set();

  if (comboPair) {
    const { r1, c1, s1, r2, c2, s2 } = comboPair;
    processed.add(cellKey(r1, c1));
    processed.add(cellKey(r2, c2));
    const comboTypes = applySpecialCombo(clearSet, r1, c1, s1, r2, c2, s2);
    comboTypes.forEach((t) => activations.push({ special: t, combo: true }));
  }

  let queue = [];
  function enqueueFromClearSet() {
    clearSet.forEach((key) => {
      if (processed.has(key)) return;
      const [r, c] = key.split(',').map(Number);
      if (specialGrid[r][c]) queue.push({ r, c, key, special: specialGrid[r][c] });
    });
  }

  enqueueFromClearSet();

  while (queue.length > 0) {
    const batch = queue;
    queue = [];

    if (batch.length >= 2) {
      const a = batch[0];
      const b = batch.find((item) => item.key !== a.key) || batch[1];
      if (a && b && !processed.has(b.key)) {
        processed.add(a.key);
        processed.add(b.key);
        const comboTypes = applySpecialCombo(clearSet, a.r, a.c, a.special, b.r, b.c, b.special);
        comboTypes.forEach((t) => activations.push({ special: t, combo: true }));
        enqueueFromClearSet();
        continue;
      }
    }

    for (const item of batch) {
      if (processed.has(item.key)) continue;
      processed.add(item.key);
      const sizeBefore = clearSet.size;
      applySingleExplosion(clearSet, item.r, item.c, item.special);
      activations.push({ special: item.special, r: item.r, c: item.c });
      if (clearSet.size - sizeBefore > 3) triggerShake(0.7);
      enqueueFromClearSet();
    }
  }

  return activations;
}

function pickSpawnCell(cells, swapOrigin) {
  if (swapOrigin) {
    const found = cells.find((c) => c.r === swapOrigin.r && c.c === swapOrigin.c);
    if (found) return found;
  }
  return cells[Math.floor(cells.length / 2)];
}

function isGroupHorizontal(cells) {
  return cells.every((c) => c.r === cells[0].r);
}

function detectCrossSpawns(matches) {
  const spawns = new Map();
  for (let i = 0; i < matches.length; i++) {
    for (let j = i + 1; j < matches.length; j++) {
      const a = matches[i];
      const b = matches[j];
      if (a.type !== b.type) continue;
      const shared = a.cells.filter((ca) => b.cells.some((cb) => cb.r === ca.r && cb.c === ca.c));
      if (shared.length !== 1) continue;
      const union = new Set([
        ...a.cells.map((c) => cellKey(c.r, c.c)),
        ...b.cells.map((c) => cellKey(c.r, c.c)),
      ]);
      if (union.size >= 5) {
        const pt = shared[0];
        spawns.set(cellKey(pt.r, pt.c), {
          r: pt.r,
          c: pt.c,
          special: SPECIAL.CROSS,
          color: a.type,
        });
      }
    }
  }
  return spawns;
}

function detectBonusSpawns(matches, swapOrigin) {
  const spawns = detectCrossSpawns(matches);

  for (const group of matches) {
    const spawnCell = pickSpawnCell(group.cells, swapOrigin);
    const key = cellKey(spawnCell.r, spawnCell.c);
    if (spawns.has(key)) continue;

    let special = null;
    if (group.len >= 5) {
      special = SPECIAL.PRISM;
    } else if (group.len === 4) {
      special = isGroupHorizontal(group.cells) ? SPECIAL.BEAM_H : SPECIAL.BEAM_V;
    }

    if (special) {
      const existing = spawns.get(key);
      const priority = { cross: 5, prism: 4, beam_h: 3, beam_v: 3, nova: 2, chrono: 1 };
      if (!existing || (priority[special] || 0) > (priority[existing.special] || 0)) {
        spawns.set(key, { r: spawnCell.r, c: spawnCell.c, special, color: group.type });
      }
    }
  }

  return spawns;
}

function swapCells(board, r1, c1, r2, c2) {
  const tmp = board[r1][c1];
  board[r1][c1] = board[r2][c2];
  board[r2][c2] = tmp;
}

function findMatches(board) {
  const groups = [];
  const specs = specialGrid;

  for (let r = 0; r < GRID_SIZE; r++) {
    let c = 0;
    while (c < GRID_SIZE) {
      const type = board[r][c];
      if (type < 0) { c++; continue; }

      let baseType = specs[r][c] ? null : type;
      const cells = [{ r, c }];
      c++;

      while (c < GRID_SIZE) {
        const t = board[r][c];
        if (t < 0) break;
        const sp = specs[r][c];
        if (sp) {
          cells.push({ r, c });
          c++;
        } else if (baseType === null) {
          baseType = t;
          cells.push({ r, c });
          c++;
        } else if (t === baseType) {
          cells.push({ r, c });
          c++;
        } else break;
      }

      if (cells.length >= 3) {
        const matchType = baseType != null ? baseType : board[cells[0].r][cells[0].c];
        groups.push({ type: matchType, cells, len: cells.length, horizontal: true });
      }
    }
  }

  for (let c = 0; c < GRID_SIZE; c++) {
    let r = 0;
    while (r < GRID_SIZE) {
      const type = board[r][c];
      if (type < 0) { r++; continue; }

      let baseType = specs[r][c] ? null : type;
      const cells = [{ r, c }];
      r++;

      while (r < GRID_SIZE) {
        const t = board[r][c];
        if (t < 0) break;
        const sp = specs[r][c];
        if (sp) {
          cells.push({ r, c });
          r++;
        } else if (baseType === null) {
          baseType = t;
          cells.push({ r, c });
          r++;
        } else if (t === baseType) {
          cells.push({ r, c });
          r++;
        } else break;
      }

      if (cells.length >= 3) {
        const matchType = baseType != null ? baseType : board[cells[0].r][cells[0].c];
        groups.push({ type: matchType, cells, len: cells.length, horizontal: false });
      }
    }
  }

  return groups;
}

function hasValidMove(board) {
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      if (specialGrid[r][c]) {
        const neighbors = [[0, 1], [1, 0], [0, -1], [-1, 0]];
        for (const [dr, dc] of neighbors) {
          const r2 = r + dr;
          const c2 = c + dc;
          if (r2 >= 0 && r2 < GRID_SIZE && c2 >= 0 && c2 < GRID_SIZE && board[r2][c2] >= 0) return true;
        }
      }
    }
  }

  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      const neighbors = [[0, 1], [1, 0]];
      for (const [dr, dc] of neighbors) {
        const r2 = r + dr;
        const c2 = c + dc;
        if (r2 >= GRID_SIZE || c2 >= GRID_SIZE) continue;
        if (!isMovable(r, c) || !isMovable(r2, c2)) continue;
        swapCells(board, r, c, r2, c2);
        const tmpS1 = specialGrid[r][c];
        const tmpS2 = specialGrid[r2][c2];
        specialGrid[r][c] = tmpS2;
        specialGrid[r2][c2] = tmpS1;
        const matches = findMatches(board);
        specialGrid[r][c] = tmpS1;
        specialGrid[r2][c2] = tmpS2;
        swapCells(board, r, c, r2, c2);
        if (matches.length > 0) return true;
      }
    }
  }
  return false;
}

function findHintMove() {
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      const neighbors = [[0, 1], [1, 0]];
      for (const [dr, dc] of neighbors) {
        const r2 = r + dr;
        const c2 = c + dc;
        if (r2 >= GRID_SIZE || c2 >= GRID_SIZE) continue;
        if (!isMovable(r, c) || !isMovable(r2, c2)) continue;
        swapCells(grid, r, c, r2, c2);
        const tmpS1 = specialGrid[r][c];
        const tmpS2 = specialGrid[r2][c2];
        specialGrid[r][c] = tmpS2;
        specialGrid[r2][c2] = tmpS1;
        const matches = findMatches(grid);
        specialGrid[r][c] = tmpS1;
        specialGrid[r2][c2] = tmpS2;
        swapCells(grid, r, c, r2, c2);
        if (matches.length > 0) return [{ r, c }, { r: r2, c: c2 }];
      }
    }
  }
  return null;
}

function applyGravity(board) {
  const falls = [];
  for (let c = 0; c < GRID_SIZE; c++) {
    let write = GRID_SIZE - 1;
    for (let r = GRID_SIZE - 1; r >= 0; r--) {
      if (isSolidCell(r, c)) {
        if (write !== r) {
          falls.push({
            fromR: r,
            toR: write,
            c,
            type: board[r][c],
            special: specialGrid[r][c],
            block: blockGrid[r][c],
          });
          board[write][c] = board[r][c];
          specialGrid[write][c] = specialGrid[r][c];
          blockGrid[write][c] = blockGrid[r][c];
          board[r][c] = -1;
          specialGrid[r][c] = null;
          blockGrid[r][c] = null;
        }
        write--;
      }
    }
    for (let r = write; r >= 0; r--) {
      const type = randomGemType();
      board[r][c] = type;
      specialGrid[r][c] = null;
      blockGrid[r][c] = null;
      falls.push({ fromR: -1, toR: r, c, type, special: null, block: null });
    }
  }
  return falls;
}

function isCrateCell(r, c) {
  return blockGrid[r][c] && blockGrid[r][c].type === 'crate';
}

function shuffleBoard(board) {
  const positions = [];
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      if (!isCrateCell(r, c) && board[r][c] >= 0) positions.push({ r, c });
    }
  }

  let attempts = 0;
  while (attempts < 80) {
    const flat = positions.map(({ r, c }) => ({
      type: board[r][c],
      special: specialGrid[r][c],
      block: blockGrid[r][c],
    }));
    for (let i = flat.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [flat[i], flat[j]] = [flat[j], flat[i]];
    }
    positions.forEach((pos, idx) => {
      board[pos.r][pos.c] = flat[idx].type;
      specialGrid[pos.r][pos.c] = flat[idx].special;
      blockGrid[pos.r][pos.c] = flat[idx].block;
    });
    if (findMatches(board).length === 0 && hasValidMove(board)) return true;
    attempts++;
  }

  positions.forEach(({ r, c }) => {
    specialGrid[r][c] = null;
    blockGrid[r][c] = null;
  });
  return fillBoardNoMatches(board);
}

function fillBoardNoMatches(board) {
  let attempts = 0;
  do {
    for (let r = 0; r < GRID_SIZE; r++) {
      for (let c = 0; c < GRID_SIZE; c++) {
        if (isCrateCell(r, c)) { board[r][c] = -1; continue; }
        board[r][c] = randomGemAvoidingMatch(board, r, c);
      }
    }
    attempts++;
  } while ((findMatches(board).length > 0 || !hasValidMove(board)) && attempts < 60);
  return attempts < 60;
}

function initBoard() {
  grid = createEmptyBoard();
  specialGrid = createEmptySpecialGrid();
  blockGrid = createEmptyBlockGrid();
  fillBoardNoMatches(grid);
}

function blockParticleColor(type) {
  return type === 'crate' ? '#d9a066' : '#bfefff';
}

function processObstacles(clearSet) {
  const damage = new Map();
  function addDmg(r, c) {
    if (!blockGrid[r][c]) return;
    const k = cellKey(r, c);
    damage.set(k, (damage.get(k) || 0) + 1);
  }
  clearSet.forEach((key) => {
    const [r, c] = key.split(',').map(Number);
    addDmg(r, c);
    const neigh = [[0, 1], [0, -1], [1, 0], [-1, 0]];
    for (const [dr, dc] of neigh) {
      const nr = r + dr;
      const nc = c + dc;
      if (nr < 0 || nr >= GRID_SIZE || nc < 0 || nc >= GRID_SIZE) continue;
      addDmg(nr, nc);
    }
  });

  const finalClear = new Set(clearSet);
  damage.forEach((cnt, key) => {
    const [r, c] = key.split(',').map(Number);
    const b = blockGrid[r][c];
    if (!b) return;
    const wasIce = b.type === 'ice';
    const pos = cellCenter(r, c);
    b.hp -= cnt;
    if (b.hp <= 0) {
      blockGrid[r][c] = null;
      burstParticles(pos.x, pos.y, blockParticleColor(b.type), 16);
      triggerShake(0.4);
    } else {
      burstParticles(pos.x, pos.y, blockParticleColor(b.type), 6);
    }
    if (wasIce && finalClear.has(key)) finalClear.delete(key);
  });

  return finalClear;
}

function freezeRandomGem() {
  const candidates = [];
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      if (grid[r][c] >= 0 && !blockGrid[r][c] && !specialGrid[r][c]) candidates.push({ r, c });
    }
  }
  if (candidates.length === 0) return;
  const pick = candidates[Math.floor(Math.random() * candidates.length)];
  blockGrid[pick.r][pick.c] = { type: 'ice', hp: 1 + Math.floor(Math.random() * 2) };
  if (!hasValidMove(grid)) {
    blockGrid[pick.r][pick.c] = null;
    return;
  }
  const pos = cellCenter(pick.r, pick.c);
  burstParticles(pos.x, pos.y, '#bfefff', 10);
  addFloatText(pos.x, pos.y - 16, 'FROZEN', '#bfefff');
}

function placeCrate() {
  const candidates = [];
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      if (grid[r][c] >= 0 && !blockGrid[r][c] && !specialGrid[r][c]) candidates.push({ r, c });
    }
  }
  if (candidates.length === 0) return;
  const pick = candidates[Math.floor(Math.random() * candidates.length)];
  const savedType = grid[pick.r][pick.c];
  grid[pick.r][pick.c] = -1;
  blockGrid[pick.r][pick.c] = { type: 'crate', hp: 2 };
  if (!hasValidMove(grid)) {
    blockGrid[pick.r][pick.c] = null;
    grid[pick.r][pick.c] = savedType;
    return;
  }
  const pos = cellCenter(pick.r, pick.c);
  burstParticles(pos.x, pos.y, '#d9a066', 10);
  addFloatText(pos.x, pos.y - 16, 'CRATE', '#d9a066');
}

function spawnObstacle(tier) {
  if (tier.crate && Math.random() < 0.4) placeCrate();
  else if (tier.ice) freezeRandomGem();
}

function registerMove() {
  moveCount++;
  const tier = DIFFICULTY_TIERS[currentTier];
  if (tier.obstacleEvery > 0 && moveCount % tier.obstacleEvery === 0) {
    spawnObstacle(tier);
  }
}

function updateTierUI() {
  const tier = DIFFICULTY_TIERS[currentTier];
  if (ui.tierDisplay) {
    ui.tierDisplay.textContent = tier.label;
    ui.tierDisplay.style.color = tier.color;
    ui.tierDisplay.style.borderColor = tier.color;
  }
}

function updateTier() {
  let t = 0;
  for (let i = 0; i < DIFFICULTY_TIERS.length; i++) {
    if (elapsed >= DIFFICULTY_TIERS[i].atSec) t = i;
  }
  if (t !== currentTier) {
    currentTier = t;
    const tier = DIFFICULTY_TIERS[t];
    addFloatText(W() / 2, H() * 0.3, `TIER: ${tier.label}`, tier.color);
    updateTierUI();
    haptic('medium');
  }
}

function rollObjective() {
  const color = Math.floor(Math.random() * GEM_TYPES);
  const target = 12 + Math.floor(Math.random() * 9);
  objective = { color, target, progress: 0 };
  updateObjectiveUI();
}

function updateObjectiveUI() {
  if (!ui.objectiveBar) return;
  if (!objective) {
    ui.objectiveBar.classList.add('hidden');
    return;
  }
  ui.objectiveBar.classList.remove('hidden');
  ui.objectiveSwatch.style.background = GEM_DEFS[objective.color].color;
  ui.objectiveSwatch.style.boxShadow = `0 0 10px ${GEM_DEFS[objective.color].color}`;
  ui.objectiveProgress.textContent = `${Math.min(objective.progress, objective.target)} / ${objective.target}`;
}

function trackObjective(clearedColors) {
  if (!objective) return;
  let added = 0;
  clearedColors.forEach((col) => { if (col === objective.color) added++; });
  if (added <= 0) return;
  objective.progress += added;
  updateObjectiveUI();
  if (objective.progress >= objective.target) completeObjective();
}

function completeObjective() {
  addTime(5);
  gameState.score += 200;
  ui.score.textContent = gameState.score;
  const tool = Math.random() < 0.5 ? 'bomb' : 'hammer';
  charges[tool] = Math.min(9, charges[tool] + 1);
  updateAbilityUI();
  addFloatText(W() / 2, H() * 0.5, 'OBJECTIVE!', '#39ff14');
  haptic('success');
  rollObjective();
}

function updateAbilityUI() {
  if (ui.bombCharge) ui.bombCharge.textContent = charges.bomb;
  if (ui.hammerCharge) ui.hammerCharge.textContent = charges.hammer;
  if (ui.abilityBomb) {
    ui.abilityBomb.classList.toggle('armed', activeTool === 'bomb');
    ui.abilityBomb.classList.toggle('depleted', charges.bomb <= 0);
  }
  if (ui.abilityHammer) {
    ui.abilityHammer.classList.toggle('armed', activeTool === 'hammer');
    ui.abilityHammer.classList.toggle('depleted', charges.hammer <= 0);
  }
}

function triggerSlowmo(ms) {
  slowmoUntil = performance.now() + ms;
}

function resetIdle() {
  lastActionAt = performance.now();
  hintCells = null;
}

function addFloatText(x, y, text, color) {
  floatTexts.push({ x, y, text, color, life: 1, vy: -0.7 });
}

function burstParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1,
      life: 1,
      decay: 0.03 + Math.random() * 0.025,
      color,
      size: 2 + Math.random() * 3,
    });
  }
}

function addTime(seconds) {
  if (seconds <= 0 || gameState.state !== 'playing') return;
  timeLeft = Math.min(MAX_TIME, timeLeft + seconds);
  ui.timer.textContent = timeLeft;
  timerPop = 1;
  const timerEl = ui.timer.parentElement;
  if (timerEl) {
    timerEl.classList.remove('timer-bonus-pop');
    void timerEl.offsetWidth;
    timerEl.classList.add('timer-bonus-pop');
  }
  addFloatText(W() * 0.78, H() * 0.1, `+${seconds}s`, '#39ff14');
}

function traceGemPath(def, x, y, s) {
  if (def.shape === 'circle') {
    ctx.arc(x, y, s * 0.38, 0, Math.PI * 2);
  } else if (def.shape === 'diamond') {
    ctx.moveTo(x, y - s * 0.42);
    ctx.lineTo(x + s * 0.34, y);
    ctx.lineTo(x, y + s * 0.42);
    ctx.lineTo(x - s * 0.34, y);
    ctx.closePath();
  } else if (def.shape === 'triangle') {
    ctx.moveTo(x, y - s * 0.4);
    ctx.lineTo(x + s * 0.36, y + s * 0.28);
    ctx.lineTo(x - s * 0.36, y + s * 0.28);
    ctx.closePath();
  } else if (def.shape === 'hex') {
    for (let i = 0; i < 6; i++) {
      const a = (Math.PI / 3) * i - Math.PI / 6;
      const px = x + Math.cos(a) * s * 0.36;
      const py = y + Math.sin(a) * s * 0.36;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();
  } else if (def.shape === 'star') {
    for (let i = 0; i < 10; i++) {
      const a = (Math.PI / 5) * i - Math.PI / 2;
      const rad = i % 2 ? s * 0.16 : s * 0.38;
      const px = x + Math.cos(a) * rad;
      const py = y + Math.sin(a) * rad;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();
  } else {
    const hs = s * 0.32;
    roundRect(ctx, x - hs, y - hs, hs * 2, hs * 2, 6);
  }
}

function drawGemShape(def, x, y, size, alpha, scale) {
  ctx.save();
  ctx.globalAlpha = alpha == null ? 1 : alpha;
  const s = size * (scale || 1);

  ctx.fillStyle = def.pad;
  ctx.beginPath();
  ctx.arc(x, y, s * 0.46, 0, Math.PI * 2);
  ctx.fill();

  ctx.shadowColor = def.color;
  ctx.shadowBlur = 18;
  ctx.beginPath();
  traceGemPath(def, x, y, s);
  const grad = ctx.createRadialGradient(x - s * 0.12, y - s * 0.14, s * 0.05, x, y, s * 0.42);
  grad.addColorStop(0, def.rim);
  grad.addColorStop(0.35, def.color);
  grad.addColorStop(1, def.core);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.shadowBlur = 0;

  ctx.strokeStyle = 'rgba(0, 0, 0, 0.55)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  traceGemPath(def, x, y, s);
  ctx.stroke();

  ctx.strokeStyle = def.rim;
  ctx.lineWidth = 2;
  ctx.beginPath();
  traceGemPath(def, x, y, s);
  ctx.stroke();

  ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
  ctx.beginPath();
  ctx.arc(x - s * 0.1, y - s * 0.14, s * 0.1, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawSpecialOverlay(special, x, y, size, alpha, now) {
  ctx.save();
  ctx.globalAlpha = alpha == null ? 1 : alpha;
  const s = size;
  const pulse = 1 + 0.06 * Math.sin(now * 0.008);

  if (special === SPECIAL.NOVA) {
    ctx.strokeStyle = '#ff4466';
    ctx.lineWidth = 2.5;
    ctx.shadowColor = '#ff2244';
    ctx.shadowBlur = 16;
    ctx.beginPath();
    ctx.arc(x, y, s * 0.22 * pulse, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(x, y, s * 0.38 * pulse, 0, Math.PI * 2);
    ctx.stroke();
    for (let i = 0; i < 8; i++) {
      const a = (Math.PI / 4) * i;
      ctx.beginPath();
      ctx.moveTo(x + Math.cos(a) * s * 0.12, y + Math.sin(a) * s * 0.12);
      ctx.lineTo(x + Math.cos(a) * s * 0.32, y + Math.sin(a) * s * 0.32);
      ctx.stroke();
    }
  } else if (special === SPECIAL.BEAM_H) {
    ctx.strokeStyle = '#00f5ff';
    ctx.lineWidth = 3;
    ctx.shadowColor = '#00f5ff';
    ctx.shadowBlur = 14;
    ctx.beginPath();
    ctx.moveTo(x - s * 0.42, y);
    ctx.lineTo(x + s * 0.42, y);
    ctx.stroke();
    ctx.fillStyle = '#00f5ff';
    ctx.beginPath();
    ctx.moveTo(x + s * 0.38, y);
    ctx.lineTo(x + s * 0.26, y - s * 0.1);
    ctx.lineTo(x + s * 0.26, y + s * 0.1);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x - s * 0.38, y);
    ctx.lineTo(x - s * 0.26, y - s * 0.1);
    ctx.lineTo(x - s * 0.26, y + s * 0.1);
    ctx.fill();
  } else if (special === SPECIAL.BEAM_V) {
    ctx.strokeStyle = '#00f5ff';
    ctx.lineWidth = 3;
    ctx.shadowColor = '#00f5ff';
    ctx.shadowBlur = 14;
    ctx.beginPath();
    ctx.moveTo(x, y - s * 0.42);
    ctx.lineTo(x, y + s * 0.42);
    ctx.stroke();
    ctx.fillStyle = '#00f5ff';
    ctx.beginPath();
    ctx.moveTo(x, y - s * 0.38);
    ctx.lineTo(x - s * 0.1, y - s * 0.26);
    ctx.lineTo(x + s * 0.1, y - s * 0.26);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x, y + s * 0.38);
    ctx.lineTo(x - s * 0.1, y + s * 0.26);
    ctx.lineTo(x + s * 0.1, y + s * 0.26);
    ctx.fill();
  } else if (special === SPECIAL.PRISM) {
    const hue = (now * 0.12) % 360;
    ctx.strokeStyle = `hsl(${hue}, 100%, 70%)`;
    ctx.lineWidth = 2.5;
    ctx.shadowColor = '#ffffff';
    ctx.shadowBlur = 18;
    ctx.beginPath();
    ctx.arc(x, y, s * 0.4 * pulse, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
    ctx.beginPath();
    ctx.arc(x, y, s * 0.14, 0, Math.PI * 2);
    ctx.fill();
  } else if (special === SPECIAL.CROSS) {
    ctx.strokeStyle = '#ffff00';
    ctx.lineWidth = 2.5;
    ctx.shadowColor = '#ffff00';
    ctx.shadowBlur = 16;
    ctx.beginPath();
    ctx.moveTo(x - s * 0.36, y);
    ctx.lineTo(x + s * 0.36, y);
    ctx.moveTo(x, y - s * 0.36);
    ctx.lineTo(x, y + s * 0.36);
    ctx.stroke();
  } else if (special === SPECIAL.CHRONO) {
    ctx.strokeStyle = '#39ff14';
    ctx.lineWidth = 2;
    ctx.shadowColor = '#39ff14';
    ctx.shadowBlur = 14;
    ctx.beginPath();
    ctx.arc(x, y, s * 0.28 * pulse, 0, Math.PI * 2);
    ctx.stroke();
    for (let i = 0; i < 12; i++) {
      const a = (Math.PI / 6) * i - Math.PI / 2;
      const inner = i % 3 === 0 ? 0.14 : 0.2;
      const outer = i % 3 === 0 ? 0.24 : 0.22;
      ctx.beginPath();
      ctx.moveTo(x + Math.cos(a) * s * inner, y + Math.sin(a) * s * inner);
      ctx.lineTo(x + Math.cos(a) * s * outer, y + Math.sin(a) * s * outer);
      ctx.stroke();
    }
    ctx.fillStyle = '#39ff14';
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x, y - s * 0.14);
    ctx.lineTo(x + s * 0.08, y);
    ctx.fill();
  }

  ctx.restore();
}

function drawCellSlots() {
  const m = gridMetrics;
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      const x = m.offsetX + c * m.cellSize;
      const y = m.offsetY + r * m.cellSize;
      const inset = 4;
      const w = m.cellSize - inset * 2;
      const h = m.cellSize - inset * 2;

      ctx.fillStyle = (r + c) % 2 === 0 ? 'rgba(14, 4, 24, 0.95)' : 'rgba(22, 6, 36, 0.92)';
      roundRect(ctx, x + inset, y + inset, w, h, 7);
      ctx.fill();

      ctx.strokeStyle = 'rgba(170, 0, 255, 0.22)';
      ctx.lineWidth = 1;
      roundRect(ctx, x + inset, y + inset, w, h, 7);
      ctx.stroke();

      ctx.strokeStyle = 'rgba(255, 255, 255, 0.04)';
      ctx.lineWidth = 1;
      roundRect(ctx, x + inset + 1, y + inset + 1, w - 2, h - 2, 6);
      ctx.stroke();
    }
  }
}

function drawBoard(now) {
  const m = gridMetrics;

  ctx.fillStyle = 'rgba(10, 2, 18, 0.85)';
  roundRect(ctx, m.offsetX - 6, m.offsetY - 6, m.size + 12, m.size + 12, 10);
  ctx.fill();
  ctx.strokeStyle = 'rgba(170, 0, 255, 0.45)';
  ctx.lineWidth = 2;
  roundRect(ctx, m.offsetX - 6, m.offsetY - 6, m.size + 12, m.size + 12, 10);
  ctx.stroke();

  drawCellSlots();

  ctx.strokeStyle = 'rgba(170, 0, 255, 0.12)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= GRID_SIZE; i++) {
    const x = m.offsetX + i * m.cellSize;
    const y = m.offsetY + i * m.cellSize;
    ctx.beginPath();
    ctx.moveTo(x, m.offsetY);
    ctx.lineTo(x, m.offsetY + m.size);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(m.offsetX, y);
    ctx.lineTo(m.offsetX + m.size, y);
    ctx.stroke();
  }

  const clearSet = anim && anim.type === 'clear' ? anim.clearSet : null;
  const animDur = anim ? anim.duration : 1;
  const clearT = anim && anim.type === 'clear' ? easeOutCubic(Math.min(1, (now - anim.start) / animDur)) : 0;
  const swapT = anim && anim.type === 'swap' ? easeOutCubic(Math.min(1, (now - anim.start) / animDur)) : 0;
  const fallT = anim && anim.type === 'fall' ? easeOutCubic(Math.min(1, (now - anim.start) / animDur)) : 0;

  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      let type = grid[r][c];

      if (type < 0) {
        const blk = blockGrid[r][c];
        if (blk && blk.type === 'crate') {
          let drawRc = r;
          if (anim && anim.type === 'fall') {
            const fall = anim.falls.find((f) => f.toR === r && f.c === c);
            if (fall) {
              const fromR = fall.fromR < 0 ? -1.2 : fall.fromR;
              drawRc = fromR + (fall.toR - fromR) * fallT;
            }
          }
          const cx = m.offsetX + c * m.cellSize + m.cellSize / 2;
          const cy = m.offsetY + drawRc * m.cellSize + m.cellSize / 2;
          drawCrate(cx, cy, m.cellSize * GEM_SIZE_RATIO, blk.hp);
        }
        continue;
      }

      let drawR = r;
      let drawC = c;
      let alpha = 1;
      let scale = 1;

      if (anim && anim.type === 'swap') {
        const { r1, c1, r2, c2, reverse } = anim;
        if (r === r1 && c === c1) {
          if (reverse) {
            drawR = r2 + (r1 - r2) * swapT;
            drawC = c2 + (c1 - c2) * swapT;
          } else {
            drawR = r + (r2 - r1) * swapT;
            drawC = c + (c2 - c1) * swapT;
          }
        } else if (r === r2 && c === c2) {
          if (reverse) {
            drawR = r1 + (r2 - r1) * swapT;
            drawC = c1 + (c2 - c1) * swapT;
          } else {
            drawR = r + (r1 - r2) * swapT;
            drawC = c + (c1 - c2) * swapT;
          }
        }
      }

      if (anim && anim.type === 'fall') {
        const fall = anim.falls.find((f) => f.toR === r && f.c === c);
        if (fall) {
          const fromR = fall.fromR < 0 ? -1.2 : fall.fromR;
          drawR = fromR + (fall.toR - fromR) * fallT;
        }
      }

      if (clearSet && clearSet.has(`${r},${c}`)) {
        alpha = 1 - clearT;
        scale = 1 + clearT * 0.35;
      }

      if (selectedCell && selectedCell.r === r && selectedCell.c === c && boardState === 'idle') {
        scale *= getSelectionScale(now);
      }
      if (pressedCell && pressedCell.r === r && pressedCell.c === c && boardState === 'idle') {
        scale *= getPressScale(now);
      }

      const pos = {
        x: m.offsetX + drawC * m.cellSize + m.cellSize / 2,
        y: m.offsetY + drawR * m.cellSize + m.cellSize / 2,
        size: m.cellSize * GEM_SIZE_RATIO,
      };

      drawGemShape(GEM_DEFS[type], pos.x, pos.y, pos.size, alpha, scale);

      const special = specialGrid[r][c];
      if (special && alpha > 0.05) {
        const specialScale = special === SPECIAL.NOVA ? scale * (1 + 0.04 * Math.sin(now * 0.01)) : scale;
        drawSpecialOverlay(special, pos.x, pos.y, pos.size * specialScale, alpha, now);
      }

      const blk = blockGrid[r][c];
      if (blk && blk.type === 'ice' && alpha > 0.05) {
        drawIce(pos.x, pos.y, pos.size * scale, alpha, blk.hp);
      }

      if (selectedCell && selectedCell.r === r && selectedCell.c === c && boardState === 'idle') {
        ctx.save();
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2.5;
        ctx.shadowColor = '#ffffff';
        ctx.shadowBlur = 14;
        roundRect(ctx, pos.x - pos.size * 0.5, pos.y - pos.size * 0.5, pos.size, pos.size, 8);
        ctx.stroke();
        ctx.strokeStyle = GEM_DEFS[type].color;
        ctx.shadowColor = GEM_DEFS[type].color;
        ctx.shadowBlur = 18;
        roundRect(ctx, pos.x - pos.size * 0.44, pos.y - pos.size * 0.44, pos.size * 0.88, pos.size * 0.88, 7);
        ctx.stroke();
        ctx.restore();
      }
    }
  }

  if (hintCells && boardState === 'idle' && gameState.state === 'playing') {
    const hintAlpha = 0.4 + 0.4 * Math.sin(now * 0.006);
    ctx.save();
    ctx.strokeStyle = `rgba(255, 255, 255, ${hintAlpha})`;
    ctx.lineWidth = 3;
    ctx.shadowColor = '#ffffff';
    ctx.shadowBlur = 16;
    hintCells.forEach((hc) => {
      const x = m.offsetX + hc.c * m.cellSize + 4;
      const y = m.offsetY + hc.r * m.cellSize + 4;
      roundRect(ctx, x, y, m.cellSize - 8, m.cellSize - 8, 8);
      ctx.stroke();
    });
    ctx.restore();
  }

  if (anim && anim.type === 'clear' && clearT >= 1) anim.particlesSpawned = true;
}

function drawCrate(x, y, size, hp) {
  ctx.save();
  const s = size;
  const half = s * 0.42;
  ctx.fillStyle = '#5a3d22';
  roundRect(ctx, x - half, y - half, half * 2, half * 2, 5);
  ctx.fill();
  const grad = ctx.createLinearGradient(x - half, y - half, x + half, y + half);
  grad.addColorStop(0, '#a9763f');
  grad.addColorStop(0.5, '#d9a066');
  grad.addColorStop(1, '#8a5c30');
  ctx.fillStyle = grad;
  roundRect(ctx, x - half * 0.88, y - half * 0.88, half * 1.76, half * 1.76, 4);
  ctx.fill();

  ctx.strokeStyle = 'rgba(60, 38, 18, 0.9)';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(x - half * 0.88, y - half * 0.88);
  ctx.lineTo(x + half * 0.88, y + half * 0.88);
  ctx.moveTo(x + half * 0.88, y - half * 0.88);
  ctx.lineTo(x - half * 0.88, y + half * 0.88);
  ctx.stroke();

  ctx.strokeStyle = 'rgba(255, 220, 170, 0.5)';
  ctx.lineWidth = 1.5;
  roundRect(ctx, x - half * 0.88, y - half * 0.88, half * 1.76, half * 1.76, 4);
  ctx.stroke();

  if (hp <= 1) {
    ctx.strokeStyle = 'rgba(20, 10, 4, 0.8)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(x - half * 0.4, y - half * 0.6);
    ctx.lineTo(x - half * 0.1, y);
    ctx.lineTo(x - half * 0.3, y + half * 0.5);
    ctx.stroke();
  }
  ctx.restore();
}

function drawIce(x, y, size, alpha, hp) {
  ctx.save();
  ctx.globalAlpha = (alpha == null ? 1 : alpha) * (hp >= 2 ? 0.62 : 0.42);
  const s = size;
  const half = s * 0.46;
  const grad = ctx.createLinearGradient(x - half, y - half, x + half, y + half);
  grad.addColorStop(0, 'rgba(220, 250, 255, 0.9)');
  grad.addColorStop(0.5, 'rgba(150, 220, 255, 0.55)');
  grad.addColorStop(1, 'rgba(190, 240, 255, 0.85)');
  ctx.fillStyle = grad;
  roundRect(ctx, x - half, y - half, half * 2, half * 2, 6);
  ctx.fill();

  ctx.globalAlpha = (alpha == null ? 1 : alpha) * 0.9;
  ctx.strokeStyle = '#dffbff';
  ctx.lineWidth = 2;
  ctx.shadowColor = '#bfefff';
  ctx.shadowBlur = 10;
  roundRect(ctx, x - half, y - half, half * 2, half * 2, 6);
  ctx.stroke();

  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(x - half * 0.5, y - half * 0.7);
  ctx.lineTo(x + half * 0.2, y - half * 0.1);
  ctx.moveTo(x + half * 0.6, y - half * 0.5);
  ctx.lineTo(x - half * 0.1, y + half * 0.4);
  ctx.stroke();
  ctx.restore();
}

function spawnClearParticles(clearSet, large) {
  clearSet.forEach((key) => {
    const [r, c] = key.split(',').map(Number);
    const type = grid[r][c];
    if (type < 0) return;
    const pos = cellCenter(r, c);
    const special = specialGrid[r][c];
    const count = large || special ? BONUS_CONFIG.particleBurstLarge : 8;
    burstParticles(pos.x, pos.y, GEM_DEFS[type].color, count);
    if (special) {
      burstParticles(pos.x, pos.y, '#ffffff', Math.floor(count * 0.4));
    }
  });
}

function drawParticles() {
  particles.forEach((p) => {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}

function drawFloatTexts() {
  floatTexts.forEach((f) => {
    ctx.save();
    ctx.globalAlpha = f.life;
    ctx.font = "bold 22px 'Orbitron', sans-serif";
    ctx.textAlign = 'center';
    ctx.fillStyle = f.color;
    ctx.shadowColor = f.color;
    ctx.shadowBlur = 14;
    ctx.fillText(f.text, f.x, f.y);
    ctx.restore();
  });
}

function updateParticles(dt) {
  const step = dt / 16.67;
  particles.forEach((p) => {
    p.x += p.vx * step;
    p.y += p.vy * step;
    p.vy += 0.08 * step;
    p.life -= p.decay * step;
  });
  particles = particles.filter((p) => p.life > 0);

  floatTexts.forEach((f) => {
    f.y += f.vy * step;
    f.life -= 0.018 * step;
  });
  floatTexts = floatTexts.filter((f) => f.life > 0);
}

function waitAnim(type, duration, data) {
  let dur = duration;
  if (performance.now() < slowmoUntil && (type === 'clear' || type === 'fall')) {
    dur = duration * 2.2;
  }
  return new Promise((resolve) => {
    anim = { type, start: performance.now(), duration: dur, resolve, particlesSpawned: false, ...data };
  });
}

function checkAnimComplete(now) {
  if (!anim) return;
  if (now - anim.start >= anim.duration) {
    const resolve = anim.resolve;
    anim = null;
    resolve();
  }
}

function scoreMatches(matches, comboLevel, clearCount, activations) {
  const unique = new Set();
  let points = 0;
  matches.forEach((group) => {
    group.cells.forEach(({ r, c }) => unique.add(`${r},${c}`));
    points += Math.max(0, group.len - 3) * 20;
  });
  points += unique.size * 10;
  if (clearCount != null && clearCount > unique.size) {
    points += (clearCount - unique.size) * 15;
  }
  let comboActivation = false;
  if (activations && activations.length > 0) {
    points = Math.floor(points * BONUS_CONFIG.specialScoreMult);
    activations.forEach((act) => {
      if (act.combo) comboActivation = true;
      const label = ACTIVATION_LABELS[act.special];
      if (label && !act.combo) {
        addFloatText(W() / 2, H() * 0.42, label, '#ff8800');
      }
    });
  }
  points *= comboLevel;
  gameState.score += points;
  ui.score.textContent = gameState.score;

  if (comboLevel === 1) addTime(TIME_BONUS_MOVE);
  else addTime(TIME_BONUS_CASCADE);

  if (comboLevel === 3) {
    const tool = Math.random() < 0.5 ? 'bomb' : 'hammer';
    charges[tool] = Math.min(9, charges[tool] + 1);
    updateAbilityUI();
    addFloatText(W() / 2, H() * 0.55, `+1 ${tool.toUpperCase()}`, '#00f5ff');
  }

  if (comboActivation || comboLevel >= 5) triggerSlowmo(450);

  if (comboLevel > 1) {
    addFloatText(W() / 2, H() * 0.38, `COMBO x${comboLevel}`, '#ffff00');
    if (comboLevel >= 5) addFloatText(W() / 2, H() * 0.48, 'PRISM SURGE!', '#aa00ff');
    haptic('light');
    playSfx('prismcascade.cascade', { volume: 0.5 });
  } else {
    haptic('tick');
    playSfx('prismcascade.match', { volume: 0.4 });
  }
}

async function clearAndFall(clearSet, spawns = new Map()) {
  boardState = 'resolving';

  const finalClear = processObstacles(clearSet);

  const clearedColors = [];
  finalClear.forEach((key) => {
    const [r, c] = key.split(',').map(Number);
    if (grid[r][c] >= 0) clearedColors.push(grid[r][c]);
  });
  trackObjective(clearedColors);

  const hasSpecialActivation = [...finalClear].some((key) => {
    const [r, c] = key.split(',').map(Number);
    return specialGrid[r][c];
  });
  spawnClearParticles(finalClear, hasSpecialActivation);
  await waitAnim('clear', CLEAR_ANIM_MS, { clearSet: finalClear });

  finalClear.forEach((key) => {
    const [r, c] = key.split(',').map(Number);
    grid[r][c] = -1;
    specialGrid[r][c] = null;
  });

  spawns.forEach((spawn) => {
    grid[spawn.r][spawn.c] = spawn.color;
    specialGrid[spawn.r][spawn.c] = spawn.special;
    const pos = cellCenter(spawn.r, spawn.c);
    const label = SPAWN_LABELS[spawn.special];
    if (label) addFloatText(pos.x, pos.y - 20, label, '#aa00ff');
  });

  const falls = applyGravity(grid);
  await waitAnim('fall', FALL_ANIM_MS, { falls });
}

async function resolveSpecialActivation(r, c, special, partnerColor, comboLevel) {
  const clearSet = new Set([cellKey(r, c)]);
  if (special === SPECIAL.PRISM) {
    applySingleExplosion(clearSet, r, c, special, partnerColor);
  } else {
    applySingleExplosion(clearSet, r, c, special);
  }
  const activations = processSpecialExplosions(clearSet);
  scoreMatches([], comboLevel, clearSet.size, activations);
  await clearAndFall(clearSet, new Map());
  await resolveCascades(comboLevel + 1);
}

async function resolveSpecialComboSwap(r1, c1, r2, c2, s1, s2) {
  const clearSet = new Set([cellKey(r1, c1), cellKey(r2, c2)]);
  const activations = processSpecialExplosions(clearSet, { r1, c1, s1, r2, c2, s2 });
  scoreMatches([], 1, clearSet.size, activations);
  await clearAndFall(clearSet, new Map());
  await resolveCascades(2);
}

async function resolveCascades(comboLevel) {
  const matches = findMatches(grid);
  if (matches.length === 0) {
    if (!hasValidMove(grid)) {
      await doReshuffle();
    }
    boardState = 'idle';
    lastSwapCell = null;
    resetIdle();
    return;
  }

  let spawns = detectBonusSpawns(matches, lastSwapCell);

  if (comboLevel >= BONUS_CONFIG.comboSpawnThreshold) {
    const candidates = [];
    matches.forEach((g) => g.cells.forEach(({ r, c }) => {
      const k = cellKey(r, c);
      if (!spawns.has(k)) candidates.push({ r, c, k, color: grid[r][c] });
    }));
    if (candidates.length > 0) {
      const pick = candidates[Math.floor(Math.random() * candidates.length)];
      spawns.set(pick.k, { r: pick.r, c: pick.c, special: SPECIAL.CHRONO, color: pick.color });
    }
  }

  const clearSet = new Set();
  matches.forEach((g) => g.cells.forEach(({ r, c }) => clearSet.add(cellKey(r, c))));

  spawns.forEach((_spawn, key) => clearSet.delete(key));

  const activations = processSpecialExplosions(clearSet);
  spawns.forEach((_spawn, key) => clearSet.delete(key));

  scoreMatches(matches, comboLevel, clearSet.size, activations);
  await clearAndFall(clearSet, spawns);
  await resolveCascades(comboLevel + 1);
}

async function doReshuffle() {
  boardState = 'noMoves';
  addFloatText(W() / 2, H() * 0.5, 'RESHUFFLE', '#aa00ff');
  playSfx('prismcascade.shuffle', { volume: 0.45 });
  ui.gameContainer.classList.add('reshuffle-flash');
  reshuffleFlash = 1;
  shuffleBoard(grid);
  await waitAnim('reshuffle', 400, {});
  ui.gameContainer.classList.remove('reshuffle-flash');
  reshuffleFlash = 0;
}

async function trySwap(r1, c1, r2, c2) {
  if (boardState !== 'idle' || gameState.state !== 'playing') return;

  if (!isMovable(r1, c1) || !isMovable(r2, c2)) {
    haptic('error');
    if (blockGrid[r1][c1]?.type === 'ice' || blockGrid[r2][c2]?.type === 'ice') {
      const fr = blockGrid[r1][c1]?.type === 'ice' ? { r: r1, c: c1 } : { r: r2, c: c2 };
      const pos = cellCenter(fr.r, fr.c);
      addFloatText(pos.x, pos.y - 16, 'FROZEN!', '#bfefff');
    }
    return;
  }

  boardState = 'swapping';
  resetIdle();
  playSfx('prismcascade.swap', { volume: 0.28 });

  lastSwapCell = { r: r2, c: c2 };

  await waitAnim('swap', SWAP_ANIM_MS, { r1, c1, r2, c2 });
  swapCellsBoth(r1, c1, r2, c2);

  const spec1 = specialGrid[r1][c1];
  const spec2 = specialGrid[r2][c2];

  if (spec1 && spec2) {
    registerMove();
    await resolveSpecialComboSwap(r1, c1, r2, c2, spec1, spec2);
    return;
  }

  if (spec1 || spec2) {
    const sr = spec1 ? r1 : r2;
    const sc = spec1 ? c1 : c2;
    const partnerR = spec1 ? r2 : r1;
    const partnerC = spec1 ? c2 : c1;
    const special = spec1 || spec2;
    registerMove();
    await resolveSpecialActivation(sr, sc, special, grid[partnerR][partnerC], 1);
    return;
  }

  const matches = findMatches(grid);
  if (matches.length === 0) {
    await waitAnim('swap', SWAP_ANIM_MS, { r1, c1, r2, c2, reverse: true });
    swapCellsBoth(r1, c1, r2, c2);
    boardState = 'idle';
    lastSwapCell = null;
    haptic('error');
    return;
  }

  registerMove();
  boardState = 'resolving';
  await resolveCascades(1);
}

async function useBomb(r, c) {
  if (boardState !== 'idle' || gameState.state !== 'playing') return;
  if (charges.bomb <= 0) { haptic('error'); return; }
  charges.bomb--;
  updateAbilityUI();
  resetIdle();
  registerMove();
  boardState = 'resolving';
  lastSwapCell = null;
  const clearSet = new Set();
  applySingleExplosion(clearSet, r, c, SPECIAL.NOVA);
  const activations = processSpecialExplosions(clearSet);
  triggerShake(0.9);
  haptic('heavy');
  playSfx('prismcascade.bomb', { volume: 0.65 });
  scoreMatches([], 1, clearSet.size, activations);
  await clearAndFall(clearSet);
  await resolveCascades(1);
}

async function useHammer(r, c) {
  if (boardState !== 'idle' || gameState.state !== 'playing') return;
  if (charges.hammer <= 0) { haptic('error'); return; }
  if (grid[r][c] < 0 && !(blockGrid[r][c] && blockGrid[r][c].type === 'crate')) {
    haptic('error');
    return;
  }
  charges.hammer--;
  updateAbilityUI();
  resetIdle();
  registerMove();
  boardState = 'resolving';
  lastSwapCell = null;
  haptic('medium');
  playSfx('prismcascade.hammer', { volume: 0.5 });

  if (grid[r][c] < 0 && blockGrid[r][c] && blockGrid[r][c].type === 'crate') {
    blockGrid[r][c] = null;
    const pos = cellCenter(r, c);
    burstParticles(pos.x, pos.y, '#d9a066', 16);
    const falls = applyGravity(grid);
    await waitAnim('fall', FALL_ANIM_MS, { falls });
    await resolveCascades(1);
    return;
  }

  const clearSet = new Set();
  addToClearSet(clearSet, r, c);
  const activations = processSpecialExplosions(clearSet);
  scoreMatches([], 1, clearSet.size, activations);
  await clearAndFall(clearSet);
  await resolveCascades(1);
}

async function useShuffle() {
  if (boardState !== 'idle' || gameState.state !== 'playing') return;
  const now = performance.now();
  if (now - shuffleCooldown < 1500) { haptic('error'); return; }
  shuffleCooldown = now;
  resetIdle();
  timeLeft = Math.max(0, timeLeft - 5);
  ui.timer.textContent = Math.max(0, timeLeft);
  addFloatText(W() / 2, H() * 0.5, '-5s SHUFFLE', '#ff8800');
  haptic('medium');
  playSfx('prismcascade.shuffle', { volume: 0.45 });
  boardState = 'noMoves';
  ui.gameContainer.classList.add('reshuffle-flash');
  reshuffleFlash = 1;
  shuffleBoard(grid);
  await waitAnim('reshuffle', 400, {});
  ui.gameContainer.classList.remove('reshuffle-flash');
  reshuffleFlash = 0;
  boardState = 'resolving';
  await resolveCascades(1);
}

function startTimer() {
  stopTimer();
  timeLeft = GAME_TIME;
  elapsed = 0;
  ui.timer.textContent = timeLeft;
  timerInterval = setInterval(() => {
    if (gameState.state !== 'playing') return;
    timeLeft--;
    elapsed++;
    updateTier();
    ui.timer.textContent = Math.max(0, timeLeft);
    if (timeLeft <= 0) endGame();
  }, 1000);
}

function stopTimer() {
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }
}

function endGame() {
  if (gameState.state === 'gameover') return;
  gameState.state = 'gameover';
  stopTimer();
  boardState = 'idle';
  anim = null;
  pointerDown = null;
  selectedCell = null;
  selectedAt = 0;
  pressedCell = null;
  pressedAt = 0;

  activeTool = null;
  hintCells = null;
  updateAbilityUI();

  ui.finalScore.textContent = gameState.score;
  if (gameState.score > gameState.best) {
    gameState.best = gameState.score;
    setHighScore('prismcascade', gameState.best);
  }
  ui.bestScore.textContent = `BEST: ${gameState.best}`;
  awardAndShowCoins('prismcascade', gameState.score);
  ui.gameoverOverlay.classList.remove('hidden');
  haptic('error');
  playSfx('prismcascade.gameover');
}

function init() {
  gameState.score = 0;
  gameState.state = 'title';
  boardState = 'idle';
  anim = null;
  particles = [];
  floatTexts = [];
  selectedCell = null;
  selectedAt = 0;
  pressedCell = null;
  pressedAt = 0;
  pointerDown = null;
  dragHandled = false;
  timeLeft = GAME_TIME;
  lastSwapCell = null;
  screenShake = 0;
  elapsed = 0;
  moveCount = 0;
  currentTier = 0;
  activeTool = null;
  charges = { bomb: 0, hammer: 0 };
  shuffleCooldown = 0;
  slowmoUntil = 0;
  hintCells = null;
  lastActionAt = performance.now();
  ui.score.textContent = '0';
  ui.timer.textContent = GAME_TIME;
  ui.bestScore.textContent = `BEST: ${gameState.best}`;
  initBoard();
  rollObjective();
  updateTierUI();
  updateAbilityUI();
}

function draw(now) {
  gridMetrics = computeGridMetrics();
  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, W(), H());

  if (reshuffleFlash > 0) {
    ctx.fillStyle = `rgba(170, 0, 255, ${reshuffleFlash * 0.12})`;
    ctx.fillRect(0, 0, W(), H());
  }

  let shakeX = 0;
  let shakeY = 0;
  if (screenShake > 0) {
    shakeX = (Math.random() - 0.5) * screenShake * 10;
    shakeY = (Math.random() - 0.5) * screenShake * 10;
  }

  ctx.save();
  ctx.translate(shakeX, shakeY);
  drawBoard(now);
  drawParticles();
  drawFloatTexts();
  ctx.restore();

  checkAnimComplete(now);
}

function update(dt) {
  updateParticles(dt);
  if (timerPop > 0) timerPop = Math.max(0, timerPop - 0.04 * (dt / 16.67));
  if (screenShake > 0) {
    screenShake = Math.max(0, screenShake - 0.08 * (dt / 16.67));
  }

  if (gameState.state === 'playing' && boardState === 'idle' && !anim && !activeTool && !selectedCell) {
    if (!hintCells && performance.now() - lastActionAt > 5000) {
      hintCells = findHintMove();
    }
  } else if (hintCells && (selectedCell || activeTool || boardState !== 'idle')) {
    hintCells = null;
  }
}

createGameLoop(update, () => draw(performance.now()));

function handleTap(cell) {
  if (boardState !== 'idle' || gameState.state !== 'playing') return;

  resetIdle();

  if (activeTool) {
    const tool = activeTool;
    activeTool = null;
    selectedCell = null;
    selectedAt = 0;
    updateAbilityUI();
    if (tool === 'bomb') useBomb(cell.r, cell.c);
    else if (tool === 'hammer') useHammer(cell.r, cell.c);
    return;
  }

  if (grid[cell.r][cell.c] < 0) {
    haptic('error');
    return;
  }

  if (blockGrid[cell.r][cell.c] && blockGrid[cell.r][cell.c].type === 'ice') {
    const pos = cellCenter(cell.r, cell.c);
    addFloatText(pos.x, pos.y - 16, 'FROZEN!', '#bfefff');
    haptic('error');
    return;
  }

  if (!selectedCell) {
    selectedCell = { r: cell.r, c: cell.c };
    selectedAt = performance.now();
    hapticLight();
    return;
  }

  if (selectedCell.r === cell.r && selectedCell.c === cell.c) {
    selectedCell = null;
    selectedAt = 0;
    hapticLight();
    return;
  }

  if (isAdjacent(selectedCell, cell)) {
    const r1 = selectedCell.r;
    const c1 = selectedCell.c;
    selectedCell = null;
    selectedAt = 0;
    trySwap(r1, c1, cell.r, cell.c);
    return;
  }

  selectedCell = { r: cell.r, c: cell.c };
  selectedAt = performance.now();
  hapticLight();
}

canvas.addEventListener('pointerdown', (e) => {
  if (boardState !== 'idle' || gameState.state !== 'playing') return;
  e.preventDefault();
  gridMetrics = computeGridMetrics();
  const cell = getCellFromPointer(e);
  if (!cell) return;
  resetIdle();
  pointerDown = { ...cell, x: e.clientX, y: e.clientY, id: e.pointerId };
  pressedCell = { r: cell.r, c: cell.c };
  pressedAt = performance.now();
  dragHandled = false;
  canvas.setPointerCapture(e.pointerId);
});

canvas.addEventListener('pointermove', (e) => {
  if (!pointerDown || dragHandled || pointerDown.id !== e.pointerId) return;
  if (activeTool) return;
  const dx = e.clientX - pointerDown.x;
  const dy = e.clientY - pointerDown.y;
  const threshold = getDragThreshold();
  if (Math.abs(dx) < threshold && Math.abs(dy) < threshold) return;

  let dr = 0;
  let dc = 0;
  if (Math.abs(dx) > Math.abs(dy)) dc = dx > 0 ? 1 : -1;
  else dr = dy > 0 ? 1 : -1;

  const r2 = pointerDown.r + dr;
  const c2 = pointerDown.c + dc;
  if (r2 >= 0 && r2 < GRID_SIZE && c2 >= 0 && c2 < GRID_SIZE) {
    dragHandled = true;
    const r1 = pointerDown.r;
    const c1 = pointerDown.c;
    selectedCell = null;
    selectedAt = 0;
    pressedCell = null;
    pressedAt = 0;
    trySwap(r1, c1, r2, c2);
  }
});

function releasePointer(e) {
  if (!pointerDown || pointerDown.id !== e.pointerId) return;

  if (!dragHandled) {
    gridMetrics = computeGridMetrics();
    const releaseCell = getCellFromPointer(e);
    const cell = releaseCell || { r: pointerDown.r, c: pointerDown.c };
    handleTap(cell);
  }

  pointerDown = null;
  pressedCell = null;
  pressedAt = 0;
  try { canvas.releasePointerCapture(e.pointerId); } catch (_e) { /* ignore */ }
}

canvas.addEventListener('pointerup', releasePointer);
canvas.addEventListener('pointercancel', releasePointer);

function armTool(tool) {
  if (gameState.state !== 'playing' || boardState !== 'idle') { haptic('error'); return; }
  if (charges[tool] <= 0) { haptic('error'); return; }
  activeTool = activeTool === tool ? null : tool;
  selectedCell = null;
  selectedAt = 0;
  resetIdle();
  updateAbilityUI();
  haptic('light');
}

ui.abilityBomb.addEventListener('click', () => armTool('bomb'));
ui.abilityHammer.addEventListener('click', () => armTool('hammer'));
ui.abilityShuffle.addEventListener('click', () => { useShuffle(); });

document.getElementById('startBtn').addEventListener('click', () => {
  unlockAudio();
  init();
  gameState.state = 'playing';
  beginCoinSession(gameState.best, 'prismcascade', () => gameState.score);
  ui.startOverlay.classList.add('hidden');
  startTimer();
  haptic('medium');
});

document.getElementById('restartBtn').addEventListener('click', () => {
  init();
  gameState.state = 'playing';
  beginCoinSession(gameState.best, 'prismcascade', () => gameState.score);
  ui.gameoverOverlay.classList.add('hidden');
  startTimer();
  haptic('medium');
});

init();
</script>
