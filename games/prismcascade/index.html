<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PRISM CASCADE — ARCADE HUB</title>
  <script>
    if (location.protocol !== 'file:') {
      for (const href of [
        '../../fonts/orbitron-latin-900-normal.woff2',
        '../../fonts/share-tech-mono-latin-400-normal.woff2',
      ]) {
        const link = document.createElement('link');
        link.rel = 'preload';
        link.href = href;
        link.as = 'font';
        link.type = 'font/woff2';
        link.crossOrigin = '';
        document.head.appendChild(link);
      }
    }
  </script>
  <link rel="stylesheet" href="../../style/fonts.css">
  <link rel="stylesheet" href="../../style/game.css">
  <link rel="stylesheet" href="../../style/prismcascade.css">
</head>
<body>

  <div class="page">
    <div class="header">
      <a href="../../index.html" class="back-btn md-btn md-btn-outlined md-ripple"><span class="material-symbols-outlined" aria-hidden="true">arrow_back</span>BACK</a>
      <div class="game-title">PRISM CASCADE</div>
      <div class="header-stats">
        <div class="tier-display" id="tierDisplay">SELECT</div>
        <div class="moves-display">MOVES: <span id="movesVal">-</span></div>
        <div class="timer-display">TIME: <span id="timerVal">60</span></div>
        <div class="score-display">SCORE: <span id="scoreVal">0</span></div>
      </div>
    </div>

    <div class="goal-bar" id="goalBar">
      <div class="goal-list" id="goalList"></div>
    </div>

    <div class="objective-bar hidden" id="objectiveBar">
      <span class="objective-label">GOAL</span>
      <span class="objective-swatch" id="objectiveSwatch"></span>
      <span class="objective-progress" id="objectiveProgress">0 / 0</span>
    </div>

    <div class="game-container" id="gameContainer">
      <canvas id="c"></canvas>

      <div class="overlay level-select-overlay" id="levelSelectOverlay">
        <div class="level-select-panel">
          <div class="level-select-header">
            <span class="level-select-kicker">CAMPAIGN</span>
            <span class="level-select-heading">SELECT LEVEL</span>
          </div>
          <div class="level-grid" id="levelGrid"></div>
        </div>
      </div>

      <div class="overlay hidden" id="winOverlay">
        <div class="overlay-title" style="color: #39ff14;">LEVEL CLEAR</div>
        <div class="overlay-sub" id="winTitle">Great job!</div>
        <div class="win-stars" id="winStars">★★★</div>
        <div class="overlay-score" id="winScore">0</div>
        <button type="button" class="start-btn md-btn md-btn-filled md-ripple" id="winNextBtn"><span class="material-symbols-outlined" aria-hidden="true">skip_next</span>NEXT</button>
        <button type="button" class="start-btn md-btn md-btn-outlined md-ripple" id="winRetryBtn"><span class="material-symbols-outlined" aria-hidden="true">refresh</span>RETRY</button>
        <button type="button" class="start-btn md-btn md-btn-outlined md-ripple" id="winMenuBtn"><span class="material-symbols-outlined" aria-hidden="true">grid_view</span>LEVELS</button>
      </div>

      <div class="overlay hidden" id="gameoverOverlay">
        <div class="overlay-title" style="color: #ff3344;" id="gameoverTitle">GAME OVER</div>
        <div class="overlay-sub" id="gameoverSub">OUT OF MOVES</div>
        <div class="overlay-score" id="finalScore">0</div>
        <div class="overlay-best" id="bestScore">BEST: 0</div>
        <div class="overlay-coins hidden" id="coinRewardBlock">
          <div class="overlay-coins-earned" id="coinRewardEarned">+0 COINS</div>
          <div class="overlay-coins-total" id="coinRewardTotal">TOTAL: 0</div>
        </div>
        <div class="overlay-coins-hint hidden" id="coinRewardHint"></div>
        <button type="button" class="start-btn md-btn md-btn-filled md-ripple" id="gameoverRetryBtn"><span class="material-symbols-outlined" aria-hidden="true">refresh</span>RETRY</button>
      </div>
    </div>

    <div class="ability-bar" id="abilityBar">
      <button class="ability-btn md-ripple" id="abilityBomb" type="button">
        <span class="ability-name">BOMB</span>
        <span class="ability-charge" id="bombCharge">0</span>
      </button>
      <button class="ability-btn md-ripple" id="abilityHammer" type="button">
        <span class="ability-name">HAMMER</span>
        <span class="ability-charge" id="hammerCharge">0</span>
      </button>
      <button class="ability-btn ability-btn-free md-ripple" id="abilityShuffle" type="button">
        <span class="ability-name">SHUFFLE</span>
        <span class="ability-cost">-5s</span>
      </button>
    </div>

    <div class="footer">MATCH 4+ FOR BONUS CRYSTALS · COMPLETE GOALS TO ADVANCE · ∞ FOR HIGH SCORE</div>
  </div>

<script src="../../js/arcade-icons.js"></script>
<script src="../../js/audio.js"></script>
<script src="../../js/perf.js"></script>
<script src="../../js/game.js"></script>
<script src="../../js/economy-api.js"></script>
<script src="../../js/prismcascade/constants.js"></script>
<script src="../../js/prismcascade/levels.js"></script>
<script src="../../js/prismcascade/render.js"></script>
<script src="../../js/prismcascade/game.js"></script>
<script>
const canvas = document.getElementById('c');
const game = new PrismCascadeGame({ canvas });
game.init();
</script>
</body>
</html>
